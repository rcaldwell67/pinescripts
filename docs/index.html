<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APM Dashboard — Adaptive Pullback Momentum</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --red:     #f85149;
      --orange:  #ffa657;
      --purple:  #bc8cff;
      --yellow:  #d29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
    header .subtitle { color: var(--muted); font-size: 12px; }
    #lastUpdated { margin-left: auto; color: var(--muted); font-size: 12px; }
    .sym-switcher { display: flex; gap: 6px; }
    .sym-btn { padding: 5px 16px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; }
    .sym-btn:hover { border-color: var(--accent); color: var(--text); }
    .sym-btn.active[data-sym="btc"] { background: #f7931a22; border-color: #f7931a; color: #f7931a; }
    .sym-btn.active[data-sym="clm"] { background: #58a6ff22; border-color: var(--accent); color: var(--accent); }
    main { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab { padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 6px; }
    .card .value { font-size: 24px; font-weight: 700; }
    .card .sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .neutral  { color: var(--accent); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .panel h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 16px; }
    .chart-wrap canvas { max-height: 300px; }
    .chart-wrap.tall canvas { max-height: 380px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { padding: 8px 12px; text-align: left; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 7px 12px; border-bottom: 1px solid #21262d; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #21262d; }
    .tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .tag-tp    { background: #3fb95022; color: var(--green);  border: 1px solid #3fb95044; }
    .tag-sl    { background: #f8514922; color: var(--red);    border: 1px solid #f8514944; }
    .tag-trail { background: #ffa65722; color: var(--orange); border: 1px solid #ffa65744; }
    .tag-mb    { background: #d2992222; color: var(--yellow); border: 1px solid #d2992244; }
    .tag-other { background: #8b949e22; color: var(--muted);  border: 1px solid #8b949e44; }
    .tag-long  { background: #58a6ff22; color: var(--accent); border: 1px solid #58a6ff44; }
    .tag-short { background: #bc8cff22; color: var(--purple); border: 1px solid #bc8cff44; }
    .cmp th:first-child, .cmp td:first-child { font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .empty { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 12px; border: 1px solid; }
    .tag-buy   { background: #3fb95022; color: var(--green);  border: 1px solid #3fb95044; }
    .tag-sell  { background: #f8514922; color: var(--red);    border: 1px solid #f8514944; }
    .tag-open  { background: #58a6ff11; color: var(--muted);  border: 1px solid #58a6ff33; }
    .tag-close { background: #21262d;   color: var(--muted);  border: 1px solid var(--border); }
    .tx-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; appearance: none; -webkit-appearance: none; }
    .tx-select:focus { outline: none; border-color: var(--accent); }
    .tx-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .tx-controls h2 { margin-bottom: 0; }
    .tx-filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .tx-count { font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
<header>
  <div>
    <h1>APM Dashboard</h1>
    <div class="subtitle">Adaptive Pullback Momentum</div>
  </div>
  <div class="sym-switcher">
    <button class="sym-btn active" data-sym="btc">BTC-USD</button>
    <button class="sym-btn" data-sym="clm">CLM</button>
  </div>
  <span id="lastUpdated"></span>
</header>
<main>
  <div class="tabs" id="tabs"></div>
  <div class="cards" id="cards"></div>
  <div class="grid-3" id="topRow">
    <div class="panel chart-wrap tall" style="grid-column: span 2;">
      <h2>Equity Curve</h2>
      <canvas id="equityChart"></canvas>
      <div class="legend" id="equityLegend"></div>
    </div>
    <div class="panel chart-wrap">
      <h2>Trade Outcomes</h2>
      <canvas id="outcomeChart"></canvas>
      <div id="outcomeLegend" style="margin-top:12px;font-size:12px;"></div>
    </div>
  </div>
  <div class="grid-2" id="midRow">
    <div class="panel chart-wrap">
      <h2 id="dirChartTitle">P&amp;L by Direction</h2>
      <canvas id="directionChart"></canvas>
    </div>
    <div class="panel chart-wrap">
      <h2>Monthly P&amp;L</h2>
      <canvas id="monthlyChart"></canvas>
    </div>
  </div>
  <div id="yearSection" style="display:none; margin-bottom:16px;">
    <div class="panel chart-wrap tall">
      <h2 id="yearChartTitle">Year-by-Year Breakdown</h2>
      <canvas id="yearChart"></canvas>
    </div>
  </div>
  <div class="panel" style="margin-bottom:16px;">
    <h2>Trade Log</h2>
    <div class="table-wrap" id="tradeTableWrap"><div class="empty">Loading…</div></div>
  </div>
  <div class="panel">
    <h2>Version Comparison</h2>
    <div class="table-wrap"><table class="cmp" id="cmpTable"></table></div>
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="tx-controls">
      <div style="display:flex;align-items:baseline;gap:10px;">
        <h2 style="margin-bottom:0;">All Transactions</h2>
        <span class="tx-count" id="txCount"></span>
      </div>
      <div class="tx-filters">
        <select id="txVerFilter" class="tx-select" onchange="renderTransactionsTable()"><option value="all">All Versions</option></select>
        <select id="txActionFilter" class="tx-select" onchange="renderTransactionsTable()"><option value="all">All Actions</option><option value="BUY">BUY</option><option value="SELL">SELL</option></select>
        <select id="txDirFilter" class="tx-select" onchange="renderTransactionsTable()"><option value="all">All Directions</option><option value="long">Long</option><option value="short">Short</option></select>
        <select id="txTypeFilter" class="tx-select" onchange="renderTransactionsTable()"><option value="all">Open &amp; Close</option><option value="Open">Open Only</option><option value="Close">Close Only</option></select>
      </div>
    </div>
    <div class="table-wrap" id="txTableWrap"><div class="empty">Loading…</div></div>
  </div>
</main>
<script>
const INSTRUMENTS = {
  btc: {
    label: 'BTC-USD',
    versions: {
      v1: { label:'v1 · 15m Shorts', tf:'15m', color:'#58a6ff', file:'data/btcusd/v1_trades.csv',
            pnlCol:'dollar_pnl', equityCol:'equity', resultCol:'result', dirCol:'direction',
            entryCol:'entry_price', exitCol:'exit_price', entryTimeCol:'entry_time', exitTimeCol:'exit_time' },
      v2: { label:'v2 · 30m Both',   tf:'30m', color:'#3fb950', file:'data/btcusd/v2_trades.csv',
            pnlCol:'dollar_pnl', equityCol:'equity', resultCol:'result', dirCol:'direction',
            entryCol:'entry', exitCol:'exit', entryTimeCol:'entry_time', exitTimeCol:'exit_time' },
      v3: { label:'v3 · 1h Longs',   tf:'1h',  color:'#ffa657', file:'data/btcusd/v3_trades.csv',
            pnlCol:'pnl', equityCol:'equity', resultCol:'exit_reason', dirCol:'direction',
            entryCol:'entry', exitCol:'exit', entryTimeCol:'entry_time', exitTimeCol:'exit_time' },
      v4: { label:'v4 · 1D Both',    tf:'1D',  color:'#bc8cff', file:'data/btcusd/v4_trades.csv',
            pnlCol:'dollar_pnl', equityCol:'equity', resultCol:'result', dirCol:'direction',
            entryCol:'entry', exitCol:'exit', entryTimeCol:'entry_time', exitTimeCol:'exit_time', hasYear:true },
    }
  },
  clm: {
    label: 'CLM',
    versions: {
      v1: { label:'v1 · 5m Shorts', tf:'5m', color:'#ff7b72', file:'data/clm/v1_trades.csv',
            pnlCol:'dollar_pnl', equityCol:'equity', resultCol:'result', dirCol:'direction',
            entryCol:'entry', exitCol:'exit', entryTimeCol:'entry_time', exitTimeCol:'exit_time' },
      v2: { label:'v2 · 10m', tf:'10m', color:'#58a6ff', file:'data/clm/v2_trades.csv',
            pnlCol:'dollar_pnl', equityCol:'equity', resultCol:'result', dirCol:'direction',
            entryCol:'entry', exitCol:'exit', entryTimeCol:'entry_time', exitTimeCol:'exit_time' },
      v3: { label:'v3 · 15m', tf:'15m', color:'#3fb950', file:'data/clm/v3_trades.csv',
            pnlCol:'dollar_pnl', equityCol:'equity', resultCol:'result', dirCol:'direction',
            entryCol:'entry', exitCol:'exit', entryTimeCol:'entry_time', exitTimeCol:'exit_time' },
      v4: { label:'v4 · 30m', tf:'30m', color:'#ffa657', file:'data/clm/v4_trades.csv',
            pnlCol:'dollar_pnl', equityCol:'equity', resultCol:'result', dirCol:'direction',
            entryCol:'entry', exitCol:'exit', entryTimeCol:'entry_time', exitTimeCol:'exit_time' },
      v5: { label:'v5 · 1h',  tf:'1h',  color:'#d29922', file:'data/clm/v5_trades.csv',
            pnlCol:'pnl', equityCol:'equity', resultCol:'exit_reason', dirCol:'direction',
            entryCol:'entry', exitCol:'exit', entryTimeCol:'entry_time', exitTimeCol:'exit_time' },
      v6: { label:'v6 · 1D',  tf:'1D',  color:'#bc8cff', file:'data/clm/v6_trades.csv',
            pnlCol:'dollar_pnl', equityCol:'equity', resultCol:'result', dirCol:'direction',
            entryCol:'entry', exitCol:'exit', entryTimeCol:'entry_time', exitTimeCol:'exit_time', hasYear:true },
    }
  }
};

const INITIAL_CAPITAL = 10000;
const loaded = { btc:{}, clm:{} };
let activeSym = 'btc';
let activeTab = 'all';
let charts = {};

function normalise(rows, sym, ver) {
  const cfg = INSTRUMENTS[sym].versions[ver];
  return rows.map(r => ({
    entry_time:  r[cfg.entryTimeCol]?.trim(),
    exit_time:   r[cfg.exitTimeCol]?.trim(),
    direction:   r[cfg.dirCol]?.trim().toLowerCase(),
    entry_price: parseFloat(r[cfg.entryCol]),
    exit_price:  parseFloat(r[cfg.exitCol]),
    dollar_pnl:  parseFloat(r[cfg.pnlCol]),
    equity:      parseFloat(r[cfg.equityCol]),
    result:      r[cfg.resultCol]?.trim().toUpperCase(),
    pnl_pct:     r.pnl_pct   ? parseFloat(r.pnl_pct)  : undefined,
    max_runup:   r.max_runup ? parseFloat(r.max_runup) : undefined,
    bars:        r.bars      ? parseInt(r.bars)        : undefined,
    year:        r.year      ? parseInt(r.year)        : undefined,
    version: ver, sym,
  })).filter(r => !isNaN(r.equity));
}

function loadCSV(sym, ver) {
  return new Promise(resolve => {
    Papa.parse(INSTRUMENTS[sym].versions[ver].file, {
      download:true, header:true, skipEmptyLines:true,
      complete: r => resolve(normalise(r.data, sym, ver))
    });
  });
}

function calcMetrics(rows) {
  if (!rows.length) return null;
  const wins   = rows.filter(r => r.dollar_pnl > 0);
  const losses = rows.filter(r => r.dollar_pnl <= 0);
  const totalPnl  = rows.reduce((s,r) => s+r.dollar_pnl, 0);
  const grossWin  = wins.reduce((s,r) => s+r.dollar_pnl, 0);
  const grossLoss = Math.abs(losses.reduce((s,r) => s+r.dollar_pnl, 0));
  const pf = grossLoss > 0 ? grossWin/grossLoss : grossWin > 0 ? Infinity : 0;
  let peak = INITIAL_CAPITAL, maxDD = 0;
  for (const r of rows) {
    if (r.equity > peak) peak = r.equity;
    const dd = (peak - r.equity) / peak * 100;
    if (dd > maxDD) maxDD = dd;
  }
  const longs  = rows.filter(r => r.direction === 'long');
  const shorts = rows.filter(r => r.direction === 'short');
  return {
    n: rows.length,
    winRate:  wins.length / rows.length * 100,
    netPnl:   totalPnl,
    netPnlPct: totalPnl / INITIAL_CAPITAL * 100,
    pf, maxDD,
    finalEquity: rows[rows.length-1]?.equity ?? INITIAL_CAPITAL,
    avgWin:  wins.length   ? grossWin   / wins.length   : 0,
    avgLoss: losses.length ? -grossLoss / losses.length : 0,
    tpCount:    rows.filter(r=>r.result==='TP').length,
    slCount:    rows.filter(r=>r.result==='SL').length,
    trailCount: rows.filter(r=>r.result==='TRAIL'||r.result==='TRAILING').length,
    mbCount:    rows.filter(r=>r.result==='MB').length,
    longs: longs.length, shorts: shorts.length,
    longWR:  longs.length  ? longs.filter(r=>r.dollar_pnl>0).length  / longs.length  * 100 : 0,
    shortWR: shorts.length ? shorts.filter(r=>r.dollar_pnl>0).length / shorts.length * 100 : 0,
    longPnl:  longs.reduce((s,r)=>s+r.dollar_pnl,0),
    shortPnl: shorts.reduce((s,r)=>s+r.dollar_pnl,0),
  };
}

const fmt$   = n => (n>=0?'+$':'-$') + Math.abs(n).toFixed(2);
const fmtPct = n => (n>=0?'+':'') + n.toFixed(2) + '%';
const clsVal = n => n>0 ? 'positive' : n<0 ? 'negative' : 'neutral';
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s.replace(' ','T'));
  return isNaN(d) ? s : d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
}
function resultTag(r) {
  if (!r) return '<span class="tag tag-other">—</span>';
  const u = r.toUpperCase();
  if (u==='TP') return '<span class="tag tag-tp">TP</span>';
  if (u==='SL') return '<span class="tag tag-sl">SL</span>';
  if (u==='MB') return '<span class="tag tag-mb">MB</span>';
  if (u.includes('TRAIL')) return '<span class="tag tag-trail">Trail</span>';
  return `<span class="tag tag-other">${r}</span>`;
}
function destroyChart(key) { if (charts[key]) { charts[key].destroy(); delete charts[key]; } }

function buildTabs() {
  const vers = INSTRUMENTS[activeSym].versions;
  const tabEl = document.getElementById('tabs');
  tabEl.innerHTML = '';
  const addBtn = (v, label, color) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (activeTab===v?' active':'');
    btn.dataset.v = v;
    btn.textContent = label;
    if (activeTab===v) btn.style.cssText = color
      ? `background:${color}22;border-color:${color};color:${color}`
      : 'background:#e6edf322;border-color:var(--text);color:var(--text)';
    btn.addEventListener('click', () => { activeTab = v; buildTabs(); render(); });
    tabEl.appendChild(btn);
  };
  addBtn('all','All Versions',null);
  for (const [vk, cfg] of Object.entries(vers)) addBtn(vk, cfg.label, cfg.color);
}

function renderCards(rows) {
  const cardEl = document.getElementById('cards');
  const vers = INSTRUMENTS[activeSym].versions;
  if (activeTab === 'all') {
    cardEl.innerHTML = Object.entries(vers).filter(([v])=>loaded[activeSym][v]?.length).map(([v,cfg])=>{
      const m = calcMetrics(loaded[activeSym][v]);
      return `<div class="card" style="border-top:2px solid ${cfg.color}">
        <div class="label">${cfg.label}</div>
        <div class="value ${clsVal(m.netPnl)}">${fmtPct(m.netPnlPct)}</div>
        <div class="sub">WR ${m.winRate.toFixed(1)}% · PF ${m.pf===Infinity?'∞':m.pf.toFixed(2)} · ${m.n} trades</div>
      </div>`;
    }).join('');
    return;
  }
  const m = calcMetrics(rows);
  if (!m) { cardEl.innerHTML=''; return; }
  cardEl.innerHTML = `
    <div class="card"><div class="label">Total Trades</div><div class="value neutral">${m.n}</div><div class="sub">${m.longs}L / ${m.shorts}S</div></div>
    <div class="card"><div class="label">Win Rate</div><div class="value ${m.winRate>=60?'positive':m.winRate>=50?'neutral':'negative'}">${m.winRate.toFixed(1)}%</div><div class="sub">${m.tpCount} TP · ${m.slCount} SL · ${m.trailCount} Trail${m.mbCount?' · '+m.mbCount+' MB':''}</div></div>
    <div class="card"><div class="label">Net P&L</div><div class="value ${clsVal(m.netPnl)}">${fmt$(m.netPnl)}</div><div class="sub">${fmtPct(m.netPnlPct)} on $${INITIAL_CAPITAL.toLocaleString()}</div></div>
    <div class="card"><div class="label">Profit Factor</div><div class="value ${m.pf>=2?'positive':m.pf>=1?'neutral':'negative'}">${m.pf===Infinity?'∞':m.pf.toFixed(3)}</div><div class="sub">Gross Win / Gross Loss</div></div>
    <div class="card"><div class="label">Max Drawdown</div><div class="value ${m.maxDD<5?'positive':m.maxDD<15?'neutral':'negative'}">-${m.maxDD.toFixed(2)}%</div><div class="sub">Peak-to-trough</div></div>
    <div class="card"><div class="label">Final Equity</div><div class="value ${clsVal(m.finalEquity-INITIAL_CAPITAL)}">$${m.finalEquity.toFixed(2)}</div><div class="sub">Started $${INITIAL_CAPITAL.toLocaleString()}</div></div>`;
}

function renderEquityChart(rows) {
  destroyChart('equity');
  const ctx = document.getElementById('equityChart').getContext('2d');
  const legendEl = document.getElementById('equityLegend');
  legendEl.innerHTML = '';
  const vers = INSTRUMENTS[activeSym].versions;
  let datasets = [];
  if (activeTab === 'all') {
    for (const [v,cfg] of Object.entries(vers)) {
      const r = loaded[activeSym][v];
      if (!r?.length) continue;
      const pts = r.map(t=>({ x:new Date(t.entry_time.replace(' ','T')), y:t.equity }));
      legendEl.innerHTML += `<div class="legend-item"><div class="dot" style="background:${cfg.color}"></div>${cfg.label}</div>`;
      datasets.push({ label:cfg.label, data:pts, borderColor:cfg.color, backgroundColor:'transparent', borderWidth:2, pointRadius:3, tension:0.1 });
    }
  } else {
    const cfg = vers[activeTab];
    const pts = rows.map(r=>({ x:new Date(r.entry_time.replace(' ','T')), y:r.equity }));
    const grad = ctx.createLinearGradient(0,0,0,300);
    grad.addColorStop(0, cfg.color+'33'); grad.addColorStop(1,'transparent');
    legendEl.innerHTML = `<div class="legend-item"><div class="dot" style="background:${cfg.color}"></div>${cfg.label}</div>`;
    datasets.push({ label:cfg.label, data:pts, borderColor:cfg.color, backgroundColor:grad, borderWidth:2, fill:true, pointRadius:3, tension:0.1 });
  }
  const allPts = datasets.flatMap(d=>d.data);
  if (allPts.length) {
    const minX = allPts.reduce((a,b)=>a.x<b.x?a:b,allPts[0]).x;
    const maxX = allPts.reduce((a,b)=>a.x>b.x?a:b,allPts[0]).x;
    datasets.push({ label:'Baseline', data:[{x:minX,y:INITIAL_CAPITAL},{x:maxX,y:INITIAL_CAPITAL}], borderColor:'#30363d', borderWidth:1, borderDash:[4,4], pointRadius:0 });
  }
  charts.equity = new Chart(ctx, {
    type:'line', data:{ datasets },
    options:{ animation:false, responsive:true, maintainAspectRatio:true,
      interaction:{ mode:'nearest', intersect:false },
      scales:{ x:{type:'time',time:{unit:'month'},grid:{color:'#21262d'},ticks:{color:'#8b949e'}}, y:{grid:{color:'#21262d'},ticks:{color:'#8b949e',callback:v=>'$'+v.toLocaleString()}} },
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=>` ${c.dataset.label}: $${c.parsed.y.toFixed(2)}` } } } }
  });
}

function renderOutcomeChart(rows) {
  destroyChart('outcome');
  const ctx = document.getElementById('outcomeChart').getContext('2d');
  const legendEl = document.getElementById('outcomeLegend');
  const all = activeTab==='all' ? Object.values(loaded[activeSym]).flat() : rows;
  const tp=all.filter(r=>r.result==='TP').length, sl=all.filter(r=>r.result==='SL').length;
  const trail=all.filter(r=>r.result==='TRAIL'||r.result==='TRAILING').length, mb=all.filter(r=>r.result==='MB').length;
  const other=all.length-tp-sl-trail-mb;
  const labels=['TP','SL','Trail'], vals=[tp,sl,trail], colors=['#3fb950','#f85149','#ffa657'];
  if (mb>0)    { labels.push('MB');    vals.push(mb);    colors.push('#d29922'); }
  if (other>0) { labels.push('Other'); vals.push(other); colors.push('#8b949e'); }
  legendEl.innerHTML = labels.map((l,i)=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)"><span style="color:${colors[i]}">${l}</span><span style="font-weight:600">${vals[i]}</span></div>`).join('');
  charts.outcome = new Chart(ctx, {
    type:'doughnut', data:{ labels, datasets:[{ data:vals, backgroundColor:colors.map(c=>c+'44'), borderColor:colors, borderWidth:1.5 }] },
    options:{ animation:false, responsive:true, cutout:'65%', plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=>` ${c.label}: ${c.parsed} (${all.length?Math.round(c.parsed/all.length*100):0}%)` } } } }
  });
}

function renderDirectionChart(rows) {
  destroyChart('direction');
  const ctx = document.getElementById('directionChart').getContext('2d');
  const vers = INSTRUMENTS[activeSym].versions;
  if (activeTab !== 'all') {
    document.getElementById('dirChartTitle').textContent = 'P&L by Direction';
    const m = calcMetrics(rows); if (!m) return;
    charts.direction = new Chart(ctx, {
      type:'bar', data:{ labels:['Longs','Shorts'], datasets:[
        { label:'Win Rate %', data:[m.longWR,m.shortWR], backgroundColor:['#58a6ff44','#bc8cff44'], borderColor:['#58a6ff','#bc8cff'], borderWidth:1.5, yAxisID:'wr' },
        { label:'Net P&L $',  data:[m.longPnl,m.shortPnl], backgroundColor:['#3fb95033','#ffa65733'], borderColor:['#3fb950','#ffa657'], borderWidth:1.5, yAxisID:'pnl' },
      ]},
      options:{ animation:false, responsive:true, scales:{
        wr: {type:'linear',position:'left', grid:{color:'#21262d'},ticks:{color:'#8b949e',callback:v=>v.toFixed(0)+'%'}},
        pnl:{type:'linear',position:'right',grid:{drawOnChartArea:false},ticks:{color:'#8b949e',callback:v=>'$'+v.toFixed(0)}},
        x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}
      }, plugins:{legend:{labels:{color:'#8b949e',font:{size:11}}}} }
    });
  } else {
    document.getElementById('dirChartTitle').textContent = 'Return by Version';
    const vkeys=Object.keys(vers).filter(v=>loaded[activeSym][v]?.length);
    const labels=vkeys.map(v=>vers[v].tf), wrs=vkeys.map(v=>calcMetrics(loaded[activeSym][v])?.winRate??0);
    const pnls=vkeys.map(v=>calcMetrics(loaded[activeSym][v])?.netPnlPct??0), colors=vkeys.map(v=>vers[v].color);
    charts.direction = new Chart(ctx, {
      type:'bar', data:{ labels, datasets:[
        { label:'Win Rate %', data:wrs,  backgroundColor:colors.map(c=>c+'44'), borderColor:colors, borderWidth:1.5, yAxisID:'wr' },
        { label:'Return %',   data:pnls, backgroundColor:pnls.map(v=>v>=0?'#3fb95022':'#f8514922'), borderColor:pnls.map(v=>v>=0?'#3fb950':'#f85149'), borderWidth:1.5, yAxisID:'pnl' },
      ]},
      options:{ animation:false, responsive:true, scales:{
        wr: {type:'linear',position:'left', grid:{color:'#21262d'},ticks:{color:'#8b949e',callback:v=>v.toFixed(0)+'%'}},
        pnl:{type:'linear',position:'right',grid:{drawOnChartArea:false},ticks:{color:'#8b949e',callback:v=>v.toFixed(1)+'%'}},
        x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}
      }, plugins:{legend:{labels:{color:'#8b949e',font:{size:11}}}} }
    });
  }
}

function renderMonthlyChart(rows) {
  destroyChart('monthly');
  const ctx=document.getElementById('monthlyChart').getContext('2d');
  const src=activeTab==='all'?Object.values(loaded[activeSym]).flat():rows;
  const monthly={};
  for (const r of src) {
    if (!r.entry_time) continue;
    const d=new Date(r.entry_time.replace(' ','T')); if (isNaN(d)) continue;
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthly[key]=(monthly[key]||0)+r.dollar_pnl;
  }
  const sorted=Object.keys(monthly).sort(), vals=sorted.map(k=>monthly[k]);
  charts.monthly = new Chart(ctx, {
    type:'bar', data:{ labels:sorted, datasets:[{ label:'Monthly P&L ($)', data:vals,
      backgroundColor:vals.map(v=>v>=0?'#3fb95066':'#f8514966'), borderColor:vals.map(v=>v>=0?'#3fb950':'#f85149'), borderWidth:1.5 }] },
    options:{ animation:false, responsive:true, scales:{
      x:{ticks:{color:'#8b949e',maxRotation:45,font:{size:10}},grid:{color:'#21262d'}},
      y:{grid:{color:'#21262d'},ticks:{color:'#8b949e',callback:v=>'$'+v.toFixed(0)}}
    }, plugins:{legend:{display:false}} }
  });
}

function renderYearChart() {
  destroyChart('year');
  const vers=INSTRUMENTS[activeSym].versions;
  const verKey=activeTab!=='all'
    ?(vers[activeTab]?.hasYear?activeTab:null)
    :Object.keys(vers).find(v=>vers[v].hasYear&&loaded[activeSym][v]?.length);
  if (!verKey) return;
  const rows=loaded[activeSym][verKey], cfg=vers[verKey];
  document.getElementById('yearChartTitle').textContent=`Year-by-Year · ${cfg.label}`;
  const years={};
  for (const r of rows) {
    const y=r.year||new Date(r.entry_time.replace(' ','T')).getFullYear();
    if (!years[y]) years[y]={pnl:0,n:0,wins:0};
    years[y].pnl+=r.dollar_pnl; years[y].n++;
    if (r.dollar_pnl>0) years[y].wins++;
  }
  const sorted=Object.keys(years).sort(), pnls=sorted.map(y=>years[y].pnl), wrs=sorted.map(y=>years[y].wins/years[y].n*100);
  const ctx=document.getElementById('yearChart').getContext('2d');
  charts.year = new Chart(ctx, {
    type:'bar', data:{ labels:sorted, datasets:[
      { label:'Net P&L ($)', data:pnls, backgroundColor:pnls.map(v=>v>=0?cfg.color+'55':'#f8514966'), borderColor:pnls.map(v=>v>=0?cfg.color:'#f85149'), borderWidth:1.5, yAxisID:'pnl' },
      { label:'Win Rate %',  data:wrs, backgroundColor:'transparent', borderColor:'#ffa657', borderWidth:2, type:'line', yAxisID:'wr', pointRadius:5 },
    ]},
    options:{ animation:false, responsive:true, scales:{
      pnl:{type:'linear',position:'left', grid:{color:'#21262d'},ticks:{color:'#8b949e',callback:v=>'$'+v.toFixed(0)}},
      wr: {type:'linear',position:'right',min:0,max:100,grid:{drawOnChartArea:false},ticks:{color:'#8b949e',callback:v=>v+'%'}},
      x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}
    }, plugins:{legend:{labels:{color:'#8b949e',font:{size:11}}}} }
  });
}

function renderTradeTable(rows) {
  const wrap=document.getElementById('tradeTableWrap');
  if (!rows?.length) { wrap.innerHTML='<div class="empty">No data</div>'; return; }
  const showVer=activeTab==='all';
  const vers=INSTRUMENTS[activeSym].versions;
  wrap.innerHTML=`<table><thead><tr>
    ${showVer?'<th>Ver</th>':''}
    <th>Entry</th><th>Exit</th><th>Dir</th><th>Entry $</th><th>Exit $</th><th>P&L</th><th>Result</th><th>Equity</th>
  </tr></thead><tbody>${rows.slice().reverse().map(r=>{
    const dirTag=r.direction==='long'?'tag-long':'tag-short';
    const cfg=vers[r.version];
    const ep=r.entry_price<100?'$'+r.entry_price?.toFixed(4):'$'+r.entry_price?.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    const xp=r.exit_price<100?'$'+r.exit_price?.toFixed(4):'$'+r.exit_price?.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    return `<tr>
      ${showVer?`<td><span class="pill" style="background:${cfg.color}22;color:${cfg.color};border-color:${cfg.color}">${cfg.tf}</span></td>`:''}
      <td>${fmtDate(r.entry_time)}</td><td>${fmtDate(r.exit_time)}</td>
      <td><span class="tag ${dirTag}">${r.direction||'—'}</span></td>
      <td>${ep}</td><td>${xp}</td>
      <td class="${clsVal(r.dollar_pnl)}">${fmt$(r.dollar_pnl)}</td>
      <td>${resultTag(r.result)}</td>
      <td>$${r.equity?.toFixed(2)}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function buildTransactions() {
  const txns = [];
  const symData = INSTRUMENTS[activeSym];
  for (const [ver, cfg] of Object.entries(symData.versions)) {
    const rows = loaded[activeSym][ver] || [];
    for (const r of rows) {
      const isLong = r.direction === 'long';
      txns.push({ time:r.entry_time, sym:activeSym, ver, cfg, symLabel:symData.label,
        action: isLong?'BUY':'SELL', price:r.entry_price, type:'Open',
        direction:r.direction, pnl:null, result:null });
      txns.push({ time:r.exit_time, sym:activeSym, ver, cfg, symLabel:symData.label,
        action: isLong?'SELL':'BUY', price:r.exit_price, type:'Close',
        direction:r.direction, pnl:r.dollar_pnl, result:r.result });
    }
  }
  txns.sort((a,b) => new Date(b.time?.replace(' ','T')||0) - new Date(a.time?.replace(' ','T')||0));
  return txns;
}

function updateVerFilter() {
  const sel = document.getElementById('txVerFilter');
  const current = sel.value;
  sel.innerHTML = '<option value="all">All Versions</option>';
  for (const [v, cfg] of Object.entries(INSTRUMENTS[activeSym].versions)) {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = cfg.label;
    sel.appendChild(opt);
  }
  if ([...sel.options].some(o=>o.value===current)) sel.value = current;
}

function renderTransactionsTable() {
  const verF    = document.getElementById('txVerFilter').value;
  const actionF = document.getElementById('txActionFilter').value;
  const dirF    = document.getElementById('txDirFilter').value;
  const typeF   = document.getElementById('txTypeFilter').value;
  updateVerFilter();
  let txns = buildTransactions();
  if (verF    !== 'all') txns = txns.filter(t => t.ver === verF);
  if (actionF !== 'all') txns = txns.filter(t => t.action === actionF);
  if (dirF    !== 'all') txns = txns.filter(t => t.direction === dirF);
  if (typeF   !== 'all') txns = txns.filter(t => t.type === typeF);
  const countEl = document.getElementById('txCount');
  countEl.textContent = txns.length ? txns.length + ' transactions' : '';
  const wrap = document.getElementById('txTableWrap');
  if (!txns.length) { wrap.innerHTML='<div class="empty">No transactions match filters</div>'; return; }
  wrap.innerHTML = `<table><thead><tr>
    <th>Date / Time</th><th>Version</th><th>Action</th><th>Type</th><th>Direction</th><th>Price</th><th>P&amp;L</th><th>Result</th>
  </tr></thead><tbody>${txns.map(t=>{
    const fmtP = p => isNaN(p)?'—' : p<100?'$'+p.toFixed(4):'$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    const actionTag = t.action==='BUY'
      ? `<span class="tag tag-buy">▲ BUY</span>`
      : `<span class="tag tag-sell">▼ SELL</span>`;
    const typeTag = t.type==='Open'
      ? `<span class="tag tag-open">Open</span>`
      : `<span class="tag tag-close">Close</span>`;
    const dirTag = t.direction==='long'
      ? `<span class="tag tag-long">long</span>`
      : `<span class="tag tag-short">short</span>`;
    const pnlCell = t.pnl!=null ? `<span class="${clsVal(t.pnl)}">${fmt$(t.pnl)}</span>` : '<span style="color:var(--border)">—</span>';
    return `<tr>
      <td>${t.time||'—'}</td>
      <td><span class="pill" style="background:${t.cfg.color}22;color:${t.cfg.color};border-color:${t.cfg.color}">${t.cfg.tf}</span></td>
      <td>${actionTag}</td><td>${typeTag}</td><td>${dirTag}</td>
      <td>${fmtP(t.price)}</td><td>${pnlCell}</td><td>${t.result?resultTag(t.result):'<span style="color:var(--border)">—</span>'}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function renderComparisonTable() {
  const el=document.getElementById('cmpTable');
  const vers=INSTRUMENTS[activeSym].versions;
  const vkeys=Object.keys(vers).filter(v=>loaded[activeSym][v]?.length);
  const items=vkeys.map(v=>({ v, m:calcMetrics(loaded[activeSym][v]), cfg:vers[v] }));
  if (!items.length) { el.innerHTML=''; return; }
  const rows=[
    ['Timeframe',       m=>m.cfg.tf],
    ['Trades',          m=>m.m.n],
    ['Win Rate',        m=>m.m.winRate.toFixed(1)+'%'],
    ['Net P&L',         m=>fmt$(m.m.netPnl)],
    ['Net Return',      m=>fmtPct(m.m.netPnlPct)],
    ['Profit Factor',   m=>m.m.pf===Infinity?'∞':m.m.pf.toFixed(3)],
    ['Max Drawdown',    m=>'-'+m.m.maxDD.toFixed(2)+'%'],
    ['Avg Win',         m=>fmt$(m.m.avgWin)],
    ['Avg Loss',        m=>fmt$(m.m.avgLoss)],
    ['Longs / Shorts',  m=>`${m.m.longs} / ${m.m.shorts}`],
    ['TP / SL / Trail', m=>`${m.m.tpCount} / ${m.m.slCount} / ${m.m.trailCount}`],
  ];
  el.innerHTML=`<thead><tr><th>Metric</th>${items.map(i=>`<th><span class="pill" style="background:${i.cfg.color}22;color:${i.cfg.color};border-color:${i.cfg.color}">${i.cfg.label}</span></th>`).join('')}</tr></thead>
  <tbody>${rows.map(([label,fn])=>`<tr><td>${label}</td>${items.map(i=>`<td>${fn(i)}</td>`).join('')}</tr>`).join('')}</tbody>`;
}

function render() {
  const vers=INSTRUMENTS[activeSym].versions;
  const rows=activeTab==='all'?Object.values(loaded[activeSym]).flat():(loaded[activeSym][activeTab]||[]);
  renderCards(rows);
  renderEquityChart(rows);
  renderOutcomeChart(rows);
  renderDirectionChart(rows);
  renderMonthlyChart(rows);
  const has1D=activeTab!=='all'
    ?(vers[activeTab]?.hasYear&&rows.length>0)
    :Object.keys(vers).some(v=>vers[v].hasYear&&loaded[activeSym][v]?.length);
  const yearSection=document.getElementById('yearSection');
  if (has1D) { yearSection.style.display=''; renderYearChart(); }
  else        { yearSection.style.display='none'; destroyChart('year'); }
  renderTradeTable(rows);
  renderComparisonTable();
  renderTransactionsTable();
}

document.querySelectorAll('.sym-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.sym===activeSym) return;
    document.querySelectorAll('.sym-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeSym=btn.dataset.sym; activeTab='all';
    const vers=INSTRUMENTS[activeSym].versions;
    const toLoad=Object.keys(vers).filter(v=>!loaded[activeSym][v]);
    if (toLoad.length) {
      Promise.all(toLoad.map(v=>loadCSV(activeSym,v).then(r=>{ loaded[activeSym][v]=r; }))).then(()=>{ buildTabs(); render(); });
    } else { buildTabs(); render(); }
  });
});

(async () => {
  await Promise.all([
    ...Object.keys(INSTRUMENTS.btc.versions).map(v=>loadCSV('btc',v).then(r=>{ loaded.btc[v]=r; })),
    ...Object.keys(INSTRUMENTS.clm.versions).map(v=>loadCSV('clm',v).then(r=>{ loaded.clm[v]=r; })),
  ]);
  document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  buildTabs(); render();
})();
</script>
</body>
</html>
