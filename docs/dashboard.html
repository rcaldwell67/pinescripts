<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APM Dashboard Switcher</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #181c20; color: #fff; margin: 0; padding: 0; }
    .switcher-container { max-width: 420px; margin: 80px auto; background: #23272e; border-radius: 12px; box-shadow: 0 2px 16px #0008; padding: 36px 32px; text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 0.5em; }
    .desc { color: #aaa; margin-bottom: 2em; }
    .switch-btn { display: block; width: 100%; margin: 1em 0; padding: 16px; font-size: 1.2em; border-radius: 8px; border: none; cursor: pointer; background: #2ad4ff; color: #181c20; font-weight: 700; transition: background 0.2s; }
    .switch-btn.react { background: #2ad4ff; }
    .switch-btn.static { background: #ff7b72; }
    .switch-btn:hover { filter: brightness(1.1); }
    .note { color: #888; font-size: 0.95em; margin-top: 2em; }
  </style>
</head>
<body>
  <div class="switcher-container">
    <h1>APM Dashboard</h1>
    <div class="desc">Choose which dashboard to view:</div>
    <a href="index.html" class="switch-btn react">React Dashboard (v6 only)</a>
    <a href="static.html" class="switch-btn static">Static Dashboard (v6 only)</a>
    <div class="note">You can bookmark this page to quickly switch between dashboards.<br>Both dashboards are filtered to show only APM v6 data.</div>
  </div>
</body>
</html>
