version: '3.8'
services:
  mariadb:
    image: mariadb:11.3
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example_root_pw
      MYSQL_DATABASE: tradingcopilot
      MYSQL_USER: admin
      MYSQL_PASSWORD: example_pw
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  backend-api:
    build: ./backend-api
    env_file:
      - ./backend-api/.env
    ports:
      - "4000:4000"
    depends_on:
      - mariadb
  backend-py:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - mariadb
volumes:
  db_data:
