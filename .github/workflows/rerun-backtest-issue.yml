# Workflow to rerun backtests via GitHub Issue trigger
# Mirrors the add-symbol.yml pattern for secure, auditable automation
name: Rerun Backtest (via Issue)
on:
  issues:
    types: [opened, edited, reopened]
    # Only run if the issue title starts with 'Rerun Backtest:'
    # This is enforced in the workflow jobs below

concurrency:
  group: rerun-backtest-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  rerun-backtest:
    if: startsWith(github.event.issue.title, 'Rerun Backtest:')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated DB
      issues: write     # needed to comment and close issue
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
      ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Extract symbol and version from issue title
        id: extract
        run: |
          python - <<'PY'
          import os
          import re

          title = os.environ.get('ISSUE_TITLE', '')
          match = re.match(r'^Rerun Backtest:\s+(.+?)\s+(.*)$', title, re.IGNORECASE)
          if not match:
            raise SystemExit(f'Could not parse symbol/version spec from issue title: {title!r}')

          symbol = match.group(1).strip().upper()
          version_spec = match.group(2).strip().lower()
          allowed = ["v1", "v2", "v3", "v4", "v5", "v6"]

          versions = []
          if version_spec in {"all", "v1 through v6", "v1-v6", "v1 to v6"}:
            versions = allowed
          else:
            range_match = re.match(r'^(v[1-6])\s*(?:through|to|-)\s*(v[1-6])$', version_spec)
            if range_match:
              start = allowed.index(range_match.group(1))
              end = allowed.index(range_match.group(2))
              if start > end:
                raise SystemExit(f'Invalid version range in title: {version_spec!r}')
              versions = allowed[start:end + 1]
            else:
              single_match = re.match(r'^(v[1-6])$', version_spec)
              if not single_match:
                raise SystemExit(
                  'Unsupported version format in issue title. '
                  'Use vN, vX through vY, or all. '
                  f'Got: {version_spec!r}'
                )
              versions = [single_match.group(1)]

          versions_csv = ','.join(versions)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
            f.write(f'symbol={symbol}\n')
            f.write(f'versions={versions_csv}\n')
            f.write(f'version_display={" ".join(versions)}\n')
          PY
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}

      - name: Run backtest for symbol and version(s)
        run: |
          SYMBOL="${{ steps.extract.outputs.symbol }}"
          VERSIONS_CSV="${{ steps.extract.outputs.versions }}"
          IFS=',' read -r -a VERSIONS <<< "$VERSIONS_CSV"

          echo "Tuning strategy runtime overrides for symbol $SYMBOL versions: ${VERSIONS[*]}"
          for VERSION in "${VERSIONS[@]}"; do
            case "$VERSION" in
              v1)
                python backend/strategy_generator/tune_v1_profile.py --symbol "$SYMBOL" --max-evals 24 --out /tmp/v1_symbol_tuning_rerun.json --apply --apply-top-level
                ;;
              v2)
                python backend/strategy_generator/tune_v2_profile.py --symbol "$SYMBOL" --max-evals 48 --out /tmp/v2_symbol_tuning_rerun.json --apply
                ;;
              v3|v4|v5|v6)
                python backend/strategy_generator/tune_v3_v6_profile.py --version "$VERSION" --symbol "$SYMBOL" --max-evals 40 --out "/tmp/${VERSION}_symbol_tuning_rerun.json" --apply
                ;;
            esac
          done

          echo "Running strategy backtest rerun for symbol $SYMBOL versions: ${VERSIONS[*]}"
          for VERSION in "${VERSIONS[@]}"; do
            echo "Running $VERSION for $SYMBOL"
            python backend/backtest_backtrader_alpaca.py --symbol "$SYMBOL" --version "$VERSION"
          done

      - name: Auto-repair weak/incomplete requested backtest versions
        id: backtest_repair
        shell: bash
        run: |
          set -euo pipefail

          SYMBOL="${{ steps.extract.outputs.symbol }}"
          VERSIONS_CSV="${{ steps.extract.outputs.versions }}"
          IFS=',' read -r -a REQUESTED_VERSIONS <<< "$VERSIONS_CSV"
          DB_PATH="docs/data/tradingcopilot.db"

          filter_to_requested() {
            local raw="$1"
            local kept=""
            for cand in $raw; do
              for req in "${REQUESTED_VERSIONS[@]}"; do
                if [ "$cand" = "$req" ]; then
                  kept="$kept $cand"
                  break
                fi
              done
            done
            echo "$kept" | xargs
          }

          detect_requested_failures() {
            local raw
            raw="$(python backend/data/check_symbol_backtest_health.py --symbol "$SYMBOL" --db "$DB_PATH")"
            filter_to_requested "$raw"
          }

          FAIL_VERSIONS="$(detect_requested_failures)"
          if [ -z "$FAIL_VERSIONS" ]; then
            echo "All requested versions passed initial backtest quality checks."
            echo "repair_status=passed" >> "$GITHUB_OUTPUT"
            echo "remaining_failures=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Initial failing requested versions for $SYMBOL: $FAIL_VERSIONS"

          for attempt in 1 2; do
            echo "Repair pass ${attempt}/2 for requested versions: $FAIL_VERSIONS"
            for VERSION in $FAIL_VERSIONS; do
              case "$VERSION" in
                v1)
                  if [ "$attempt" -eq 1 ]; then
                    EVALS=96
                    SEED=101
                  else
                    EVALS=160
                    SEED=202
                  fi
                  python backend/strategy_generator/tune_v1_profile.py \
                    --symbol "$SYMBOL" \
                    --max-evals "$EVALS" \
                    --seed "$SEED" \
                    --min-win-rate 55 \
                    --min-net-return 0 \
                    --max-drawdown 12 \
                    --out /tmp/v1_symbol_tuning_rerun_repair.json \
                    --apply \
                    --apply-top-level \
                    --apply-best-available
                  ;;
                v2)
                  if [ "$attempt" -eq 1 ]; then
                    EVALS=120
                    SEED=101
                  else
                    EVALS=180
                    SEED=202
                  fi
                  python backend/strategy_generator/tune_v2_profile.py \
                    --symbol "$SYMBOL" \
                    --max-evals "$EVALS" \
                    --seed "$SEED" \
                    --min-win-rate 55 \
                    --min-net-return 0 \
                    --max-drawdown 12 \
                    --out /tmp/v2_symbol_tuning_rerun_repair.json \
                    --apply \
                    --apply-best-available
                  ;;
                v3|v4|v5|v6)
                  if [ "$attempt" -eq 1 ]; then
                    EVALS=120
                    SEED=101
                  else
                    EVALS=180
                    SEED=202
                  fi
                  python backend/strategy_generator/tune_v3_v6_profile.py \
                    --version "$VERSION" \
                    --symbol "$SYMBOL" \
                    --max-evals "$EVALS" \
                    --seed "$SEED" \
                    --min-win-rate 55 \
                    --min-net-return 0 \
                    --max-drawdown 12 \
                    --out "/tmp/${VERSION}_symbol_tuning_rerun_repair.json" \
                    --apply \
                    --apply-best-available
                  ;;
              esac

              echo "Re-running backtest for $SYMBOL $VERSION"
              python backend/backtest_backtrader_alpaca.py --symbol "$SYMBOL" --version "$VERSION"
            done

            FAIL_VERSIONS="$(detect_requested_failures)"
            if [ -z "$FAIL_VERSIONS" ]; then
              echo "All requested versions passed after repair pass $attempt."
              echo "repair_status=passed_after_repair" >> "$GITHUB_OUTPUT"
              echo "remaining_failures=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Still failing after pass $attempt: $FAIL_VERSIONS"
          done

          echo "repair_status=warning" >> "$GITHUB_OUTPUT"
          echo "remaining_failures=$FAIL_VERSIONS" >> "$GITHUB_OUTPUT"
          echo "::warning::Backtest quality still below thresholds for requested versions after repair attempts: $FAIL_VERSIONS"
          exit 0

      - name: Commit updated DB
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tradingcopilot.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
          else
            COMMIT_MSG="chore: rerun backtest ${{ steps.extract.outputs.symbol }} [${{ steps.extract.outputs.version_display }}] (#${{ github.event.issue.number }})"
            SNAPSHOT_DB="$(mktemp)"
            cp docs/data/tradingcopilot.db "$SNAPSHOT_DB"
            for attempt in 1 2 3; do
              echo "Push attempt ${attempt}/3"

              git fetch origin main
              git reset --hard origin/main
              cp "$SNAPSHOT_DB" docs/data/tradingcopilot.db

              git add docs/data/tradingcopilot.db
              if git diff --cached --quiet; then
                echo "No effective DB changes remain after syncing with origin/main."
                exit 0
              fi

              git commit -m "$COMMIT_MSG"

              if git push origin HEAD:main; then
                echo "Push succeeded."
                exit 0
              fi
              echo "Push attempt ${attempt} failed; retrying after short delay..."
              sleep 2
            done
            echo "ERROR: Unable to push after 3 attempts due to repeated remote updates."
            exit 1
          fi

      - name: Comment with result
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ Backtest rerun workflow completed for ${{ steps.extract.outputs.symbol }} ${{ steps.extract.outputs.version_display }}.

            Backtest repair status: `${{ steps.backtest_repair.outputs.repair_status }}`
            Remaining weak/incomplete requested versions after repair: `${{ steps.backtest_repair.outputs.remaining_failures || 'none' }}`

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
