# Workflow to rerun backtests via GitHub Issue trigger
# Mirrors the add-symbol.yml pattern for secure, auditable automation
name: Rerun Backtest (via Issue)
on:
  issues:
    types: [opened]
    # Only run if the issue title starts with 'Rerun Backtest:'
    # This is enforced in the workflow jobs below

jobs:
  rerun-backtest:
    if: startsWith(github.event.issue.title, 'Rerun Backtest:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Extract symbol and version from issue title
        id: extract
        run: |
          # Title format: Rerun Backtest: SYMBOL VERSION
          TITLE="${{ github.event.issue.title }}"
          PARTS=($TITLE)
          SYMBOL=${PARTS[2]}
          VERSION=${PARTS[3]}
          echo "symbol=$SYMBOL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run backtest for symbol and version
        run: |
          echo "Running backtest for symbol ${{ steps.extract.outputs.symbol }} version ${{ steps.extract.outputs.version }}..."
          python backend/backtest_backtrader_alpaca.py --symbol "${{ steps.extract.outputs.symbol }}" --version "${{ steps.extract.outputs.version }}"

      - name: Comment with result
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ Backtest rerun workflow completed for ${{ steps.extract.outputs.symbol }} ${{ steps.extract.outputs.version }}.
            (Customize this message with actual results.)

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
