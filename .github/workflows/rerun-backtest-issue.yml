# Workflow to rerun backtests via GitHub Issue trigger
# Mirrors the add-symbol.yml pattern for secure, auditable automation
name: Rerun Backtest (via Issue)
on:
  issues:
    types: [opened]
    # Only run if the issue title starts with 'Rerun Backtest:'
    # This is enforced in the workflow jobs below

concurrency:
  group: db-writer-main
  cancel-in-progress: false

jobs:
  rerun-backtest:
    if: startsWith(github.event.issue.title, 'Rerun Backtest:')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated DB
      issues: write     # needed to comment and close issue
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
      ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Extract symbol and version from issue title
        id: extract
        run: |
          python - <<'PY'
          import os
          import re

          title = os.environ.get('ISSUE_TITLE', '')
          match = re.match(r'^Rerun Backtest:\s+(.+?)\s+(v\d+)\s*$', title, re.IGNORECASE)
          if not match:
            raise SystemExit(f'Could not parse symbol/version from issue title: {title!r}')

          symbol = match.group(1).strip().upper()
          version = match.group(2).strip().lower()
          if version not in {"v1", "v2", "v3", "v4", "v5", "v6"}:
            raise SystemExit(f'Unsupported version in issue title: {version!r} (expected v1-v6)')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
            f.write(f'symbol={symbol}\n')
            f.write(f'version={version}\n')
          PY
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}

      - name: Run backtest for symbol and version
        run: |
          echo "Running backtest for symbol ${{ steps.extract.outputs.symbol }} version ${{ steps.extract.outputs.version }}..."
          if [[ "${{ steps.extract.outputs.version }}" == "v1" ]]; then
            python reset_aligned_backtest_paper.py --version v1 --symbol "${{ steps.extract.outputs.symbol }}"
          elif [[ "${{ steps.extract.outputs.version }}" == "v2" ]]; then
            python reset_aligned_backtest_paper.py --version v2 --symbol "${{ steps.extract.outputs.symbol }}"
          else
            python backend/backtest_backtrader_alpaca.py --symbol "${{ steps.extract.outputs.symbol }}" --version "${{ steps.extract.outputs.version }}"
          fi

      - name: Commit updated DB
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tradingcopilot.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
          else
            COMMIT_MSG="chore: rerun backtest ${{ steps.extract.outputs.symbol }} ${{ steps.extract.outputs.version }} (#${{ github.event.issue.number }})"
            SNAPSHOT_DB="$(mktemp)"
            cp docs/data/tradingcopilot.db "$SNAPSHOT_DB"
            for attempt in 1 2 3; do
              echo "Push attempt ${attempt}/3"

              git fetch origin main
              git reset --hard origin/main
              cp "$SNAPSHOT_DB" docs/data/tradingcopilot.db

              git add docs/data/tradingcopilot.db
              if git diff --cached --quiet; then
                echo "No effective DB changes remain after syncing with origin/main."
                exit 0
              fi

              git commit -m "$COMMIT_MSG"

              if git push origin HEAD:main; then
                echo "Push succeeded."
                exit 0
              fi
              echo "Push attempt ${attempt} failed; retrying after short delay..."
              sleep 2
            done
            echo "ERROR: Unable to push after 3 attempts due to repeated remote updates."
            exit 1
          fi

      - name: Comment with result
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ Backtest rerun workflow completed for ${{ steps.extract.outputs.symbol }} ${{ steps.extract.outputs.version }}.
            (Customize this message with actual results.)

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
