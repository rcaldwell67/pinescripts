name: Scheduler Health Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      test_notification:
        description: "Send a Discord test notification"
        required: false
        default: false
        type: boolean

concurrency:
  group: scheduler-health-main
  cancel-in-progress: true

jobs:
  scheduler-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.SCHEDULER_ALERT_WEBHOOK }}
      DISCORD_USER_ID: ${{ secrets.SCHEDULER_ALERT_USER_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate scheduler cadence (UTC today)
        run: |
          python backend/paper_trading/validate_scheduler_health.py \
            --date "$(date -u +%F)" \
            --recent-window-minutes 60 \
            --max-schedule-misses 2 \
            --max-gap-minutes 20 \
            --max-latest-gap-minutes 25

      - name: Send Discord test notification
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_notification == 'true'
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "SCHEDULER_ALERT_WEBHOOK secret is not set; skipping Discord test notification."
            exit 0
          fi

          mention=""
          if [ -n "${DISCORD_USER_ID}" ]; then
            mention="<@${DISCORD_USER_ID}> "
          fi

          payload="{\"content\":\"${mention}✅ Scheduler Health Check test notification for rcaldwell67 in ${GITHUB_REPOSITORY}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
          curl -sS -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${payload}"

      - name: Notify on scheduler health failure
        if: failure()
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "SCHEDULER_ALERT_WEBHOOK secret is not set; skipping Discord failure notification."
            exit 0
          fi

          mention=""
          if [ -n "${DISCORD_USER_ID}" ]; then
            mention="<@${DISCORD_USER_ID}> "
          fi

          payload="{\"content\":\"${mention}🚨 Scheduler Health Check failed for rcaldwell67 in ${GITHUB_REPOSITORY} on ${GITHUB_REF_NAME}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
          curl -sS -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${payload}"
