name: Scheduler Health Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: scheduler-health-main
  cancel-in-progress: true

jobs:
  scheduler-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate scheduler cadence (UTC today)
        run: |
          python backend/paper_trading/validate_scheduler_health.py \
            --date "$(date -u +%F)" \
            --max-schedule-misses 2 \
            --max-gap-minutes 20
