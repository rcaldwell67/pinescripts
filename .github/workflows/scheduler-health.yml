name: Scheduler Health Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: scheduler-health-main
  cancel-in-progress: true

jobs:
  scheduler-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ALERT_WEBHOOK_URL: ${{ secrets.SCHEDULER_ALERT_WEBHOOK }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate scheduler cadence (UTC today)
        run: |
          python backend/paper_trading/validate_scheduler_health.py \
            --date "$(date -u +%F)" \
            --max-schedule-misses 0 \
            --max-gap-minutes 10

      - name: Notify on scheduler health failure
        if: failure()
        run: |
          if [ -z "${ALERT_WEBHOOK_URL}" ]; then
            echo "SCHEDULER_ALERT_WEBHOOK secret is not set; skipping webhook notification."
            exit 0
          fi

          payload="{\"text\":\"Scheduler Health Check failed in ${GITHUB_REPOSITORY} on ${GITHUB_REF_NAME}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
          curl -sS -X POST "${ALERT_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${payload}"
