name: Populate Alpaca Symbols Table

on:
  schedule:
    # Run weekly on Sunday at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    # Allow manual trigger from Actions tab
  push:
    paths:
      - '.github/workflows/populate-alpaca-symbols.yml'
      - 'backend/data/populate_alpaca_symbols.py'

concurrency:
  group: db-writer-main
  cancel-in-progress: false

jobs:
  populate-symbols:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Populate Alpaca symbols table
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          python backend/data/populate_alpaca_symbols.py

      - name: Commit and push DB changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add frontend-react/public/data/tradingcopilot.db
          git diff --cached --quiet && echo 'No changes to commit' || (git commit -m "Populate Alpaca symbols table" && git push)
