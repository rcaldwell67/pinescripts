name: Close V1 Guidelines

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile name to update and enforce"
        required: false
        default: "guideline_closed"
      symbols:
        description: "Space-separated symbols to retune before enforcement"
        required: false
        default: "BTC/USD ETH/USD CLM CRF"
      max_evals:
        description: "Per-symbol tuning budget"
        required: false
        default: "120"
      seed_base:
        description: "Base seed; increments per symbol"
        required: false
        default: "42"
      skip_tune:
        description: "Skip tuning and only validate/report the selected profile"
        required: false
        default: "false"

jobs:
  close-guidelines:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
      ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run v1 guideline closure loop
        run: |
          CMD=(python backend/strategy_generator/close_v1_guidelines.py \
            --profile "${{ inputs.profile }}" \
            --max-evals "${{ inputs.max_evals }}" \
            --seed-base "${{ inputs.seed_base }}" \
            --report-out docs/data/v1_guideline_report_ci_close.json)

          if [ "${{ inputs.skip_tune }}" = "true" ]; then
            CMD+=(--skip-tune)
          fi

          CMD+=(--symbols ${{ inputs.symbols }})
          "${CMD[@]}"

      - name: Upload v1 closure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1-guideline-closure
          path: |
            docs/data/v1_guideline_report_ci_close.json
            docs/data/v1_profile_tuning_result_*_guideline.json
