name: Alpaca Paper Trading (Manual)

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Optional symbol, e.g. CLM"
        required: false
        type: string
      version:
        description: "Strategy version to run (v6 only)"
        required: false
        default: "v6"
        type: string
      max_open_positions:
        description: "Max simultaneous open positions"
        required: false
        default: "8"
        type: string
      close_on_signal:
        description: "Close existing position when a fresh signal appears"
        required: false
        default: "false"
        type: string
      stream_bars:
        description: "Trigger evaluations from Alpaca websocket bars"
        required: false
        default: "false"
        type: string

concurrency:
  group: db-writer-main
  cancel-in-progress: false

jobs:
  alpaca-paper-trading:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alpaca realtime paper trading
        shell: bash
        env:
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          set -euo pipefail
          VERSION_INPUT="${{ github.event.inputs.version || 'v6' }}"
          SYMBOL="${{ github.event.inputs.symbol || '' }}"
          MAX_OPEN_POSITIONS="${{ github.event.inputs.max_open_positions || '8' }}"
          CLOSE_ON_SIGNAL="${{ github.event.inputs.close_on_signal || 'false' }}"
          STREAM_BARS="${{ github.event.inputs.stream_bars || 'false' }}"

          VERSIONS=(v6)

          EXTRA_FLAGS="--max-open-positions ${MAX_OPEN_POSITIONS}"
          if [[ "${CLOSE_ON_SIGNAL,,}" == "true" || "${CLOSE_ON_SIGNAL}" == "1" || "${CLOSE_ON_SIGNAL,,}" == "yes" ]]; then
            EXTRA_FLAGS+=" --close-on-signal"
          fi
          if [[ "${STREAM_BARS,,}" == "true" || "${STREAM_BARS}" == "1" || "${STREAM_BARS,,}" == "yes" ]]; then
            EXTRA_FLAGS+=" --stream-bars"
          fi

          for VERSION in "${VERSIONS[@]}"; do
            if [[ "$VERSION" != "v6" ]]; then
              echo "Unsupported version: $VERSION (only v6 is allowed)" >&2
              exit 1
            fi
            if [[ -n "$SYMBOL" ]]; then
              python backend/paper_trading/realtime_alpaca_paper_trader.py --symbol "$SYMBOL" --version "$VERSION" $EXTRA_FLAGS
            else
              python backend/paper_trading/realtime_alpaca_paper_trader.py --all-symbols --version "$VERSION" $EXTRA_FLAGS
            fi
          done

      - name: Commit updated DB
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend-react/public/data/tradingcopilot.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
            exit 0
          fi
          COMMIT_MSG="chore: manual alpaca paper trading $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SNAPSHOT_DB="$(mktemp)"
          cp frontend-react/public/data/tradingcopilot.db "$SNAPSHOT_DB"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            git fetch origin main
            git reset --hard origin/main
            cp "$SNAPSHOT_DB" frontend-react/public/data/tradingcopilot.db

            git add frontend-react/public/data/tradingcopilot.db
            if git diff --cached --quiet; then
              echo "No effective DB changes remain after syncing with origin/main."
              exit 0
            fi

            git commit -m "$COMMIT_MSG"
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying after short delay..."
            sleep 2
          done

          echo "ERROR: Unable to push after 3 attempts due to repeated remote updates."
          exit 1
