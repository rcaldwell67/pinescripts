name: Alpaca Paper Trades Sync

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  sync-paper-trades:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install alpaca-py python-dotenv
      - name: Run Alpaca Paper Trades Sync
        env:
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
          ALPACA_MODE: paper
        run: |
          python fetch_alpaca_paper_trades.py
