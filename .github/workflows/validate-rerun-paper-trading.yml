name: Validate Rerun Paper Trading

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'docs/data/tradingcopilot.db'
      - '.github/workflows/rerun-paper-trade-issue.yml'
      - '.github/workflows/validate-rerun-paper-trading.yml'

jobs:
  validate-rerun-paper-trading:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate rerun paper trading path
        run: |
          python backend/paper_trading/validate_rerun_paper_trading.py