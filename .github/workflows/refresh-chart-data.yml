name: Refresh Chart Data

# Runs every 15 minutes, 24/7.
# Also triggerable manually via the Actions tab → "Run workflow".
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit & push updated JSON files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install alpaca-py python-dotenv pytz

      - name: Fetch chart data
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: python docs/fetch_chart_data.py

      - name: Commit updated JSON (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/chart_clm.json docs/data/chart_btcusd.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh chart data $(date -u +%Y-%m-%d)"
            git push
          fi
