name: Backtrader Backtest CI

on:
  push:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/backtrader-backtest.yml'
      - 'docs/data/symbols.csv'
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/backtrader-backtest.yml'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backtrader Backtests
        run: |
          # Example: run all backtest scripts in backend/ and scripts/ recursively
          find backend/ scripts/ -type f -name 'backtest_*.py' -exec python {} \;
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
