name: Backtrader Backtest CI

on:
  push:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/backtrader-backtest.yml'
      - 'docs/data/tradingcopilot.db'
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/backtrader-backtest.yml'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run v6 local smoke validation
        run: |
          python backend/strategy_generator/validate_all_versions_smoke.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}

      - name: Upload error log if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest_error_log
          path: backend/backtest_error.log

      # Emailing step removed for simplicity and security
