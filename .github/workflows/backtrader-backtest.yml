name: Backtrader Backtest CI

on:
  push:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/backtrader-backtest.yml'
      - 'docs/data/symbols.csv'
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/backtrader-backtest.yml'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backtrader Backtests
        run: |
          # Example: run all backtest scripts in backend/ and scripts/ recursively
          find backend/ scripts/ -type f -name 'backtest_*.py' -exec python {} \;
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}

      - name: Upload error log if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest_error_log
          path: backend/backtest_error.log

      - name: Send error log to Gmail if exists and non-empty
        if: always()
        run: |
          if [ -s backend/backtest_error.log ]; then \
            echo "Backtest error log attached." | mail -s "Backtest Error Log - $GITHUB_WORKFLOW" -A backend/backtest_error.log "$GMAIL_TO"; \
          else \
            echo "No error log to send."; \
          fi
        env:
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
