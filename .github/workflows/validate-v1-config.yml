name: Validate V1 Config Usage

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-v1-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate shared v1 parameter usage
        run: |
          python backend/strategy_generator/validate_v1_config_usage.py
// File removed: Only version 6 is supported
