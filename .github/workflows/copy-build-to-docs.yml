name: Copy React Build to Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend-react/**'
      - '.github/workflows/copy-build-to-docs.yml'

jobs:
  copy-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend-react

      - name: Build React app
        env:
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/"
        run: npm run build --prefix frontend-react

      - name: Copy build output to docs/
        run: |
          rm -rf docs/*
          cp -r frontend-react/dist/* docs/

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/
          git diff --cached --quiet || git commit -m 'Copy React build output to docs/ [skip ci]'
          git push
