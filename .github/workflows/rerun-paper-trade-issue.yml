name: Rerun Paper Trading (via Issue)

on:
  issues:
    types: [opened]

concurrency:
  group: db-writer-paper-rerun
  cancel-in-progress: false

jobs:
  rerun-paper-trade:
    if: startsWith(github.event.issue.title, 'Rerun Paper Trading:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
      ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Extract symbol/version and paper options from issue
        id: extract
        run: |
          python - <<'PY'
          import os
          import re

          title = os.environ.get('ISSUE_TITLE', '')
          body = os.environ.get('ISSUE_BODY', '')
          match = re.match(r'^Rerun Paper Trading:\s+(.+?)\s+(v\d+)\s*$', title, re.IGNORECASE)
          if not match:
            raise SystemExit(f'Could not parse symbol/version from issue title: {title!r}')

          symbol = match.group(1).strip().upper()
          version = match.group(2).strip().lower()
          if version not in {"v1", "v2", "v3", "v4", "v5", "v6"}:
            raise SystemExit(f'Unsupported version in issue title: {version!r} (expected v1-v6)')

          def parse_setting(label: str, default: str) -> str:
            m = re.search(rf'^{re.escape(label)}:\s*(.+?)\s*$', body, re.IGNORECASE | re.MULTILINE)
            return (m.group(1).strip() if m else default)

          execution_mode = parse_setting('Execution Mode', 'simulation').lower()
          if execution_mode not in {'realtime', 'simulation'}:
            execution_mode = 'simulation'

          simulation_data_scope = parse_setting('Simulation Data Scope', 'historical').lower()
          if simulation_data_scope not in {'historical', 'same_day'}:
            simulation_data_scope = 'historical'

          force_reset = parse_setting('Force Reset', 'false').lower() in {'1', 'true', 'yes'}

          prefer_realtime_data = parse_setting('Prefer Realtime Data', 'true').lower() in {'1', 'true', 'yes'}
          realtime_only_data = parse_setting('Realtime Only Data', 'true').lower() in {'1', 'true', 'yes'}

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
            f.write(f'symbol={symbol}\n')
            f.write(f'version={version}\n')
            f.write(f'execution_mode={execution_mode}\n')
            f.write(f'simulation_data_scope={simulation_data_scope}\n')
            f.write(f'force_reset={str(force_reset).lower()}\n')
            f.write(f'prefer_realtime_data={str(prefer_realtime_data).lower()}\n')
            f.write(f'realtime_only_data={str(realtime_only_data).lower()}\n')
          PY
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Run paper trading for symbol and version
        run: |
          set -euo pipefail
          SYMBOL="${{ steps.extract.outputs.symbol }}"
          VERSION="${{ steps.extract.outputs.version }}"
          EXECUTION_MODE="${{ steps.extract.outputs.execution_mode }}"
          SIM_SCOPE="${{ steps.extract.outputs.simulation_data_scope }}"
          FORCE_RESET="${{ steps.extract.outputs.force_reset }}"
          PREFER_REALTIME_DATA="${{ steps.extract.outputs.prefer_realtime_data }}"
          REALTIME_ONLY_DATA="${{ steps.extract.outputs.realtime_only_data }}"

          REALTIME_DATA_FLAG=""
          if [[ "${PREFER_REALTIME_DATA,,}" == "true" || "${PREFER_REALTIME_DATA}" == "1" || "${PREFER_REALTIME_DATA,,}" == "yes" ]]; then
            REALTIME_DATA_FLAG="--prefer-realtime-data"
          fi

          REALTIME_ONLY_FLAG=""
          if [[ "${REALTIME_ONLY_DATA,,}" == "true" || "${REALTIME_ONLY_DATA}" == "1" || "${REALTIME_ONLY_DATA,,}" == "yes" ]]; then
            REALTIME_ONLY_FLAG="--realtime-only-data"
          fi

          SIM_SCOPE_FLAG="--data-scope historical"
          if [[ "${SIM_SCOPE}" == "same_day" ]]; then
            SIM_SCOPE_FLAG="--data-scope same_day"
          fi

          FORCE_RESET_FLAG=""
          if [[ "${FORCE_RESET,,}" == "true" || "${FORCE_RESET}" == "1" || "${FORCE_RESET,,}" == "yes" ]]; then
            FORCE_RESET_FLAG="--force-reset"
          fi

          if [[ "${EXECUTION_MODE}" == "simulation" ]]; then
            echo "Running simulation paper trading for symbol ${SYMBOL} version ${VERSION} (scope=${SIM_SCOPE})..."
            if [[ "${VERSION}" == "v1" || "${VERSION}" == "v2" ]]; then
              python reset_aligned_backtest_paper.py --version "${VERSION}" --symbol "${SYMBOL}" $REALTIME_DATA_FLAG $REALTIME_ONLY_FLAG $SIM_SCOPE_FLAG
            else
              python backend/paper_trading/paper_trade_backtrader_alpaca.py --symbol "${SYMBOL}" --version "${VERSION}" $FORCE_RESET_FLAG $REALTIME_DATA_FLAG $REALTIME_ONLY_FLAG $SIM_SCOPE_FLAG
            fi
          else
            echo "Running realtime paper trading for symbol ${SYMBOL} version ${VERSION}..."
            python backend/paper_trading/realtime_alpaca_paper_trader.py --symbol "$SYMBOL" --version "$VERSION"
          fi

      - name: Commit updated DB
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tradingcopilot.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
          else
            COMMIT_MSG="chore: rerun paper trading ${{ steps.extract.outputs.symbol }} ${{ steps.extract.outputs.version }} (#${{ github.event.issue.number }})"
            SNAPSHOT_DB="$(mktemp)"
            cp docs/data/tradingcopilot.db "$SNAPSHOT_DB"
            for attempt in 1 2 3; do
              echo "Push attempt ${attempt}/3"

              git fetch origin main
              git reset --hard origin/main
              cp "$SNAPSHOT_DB" docs/data/tradingcopilot.db

              git add docs/data/tradingcopilot.db
              if git diff --cached --quiet; then
                echo "No effective DB changes remain after syncing with origin/main."
                exit 0
              fi

              git commit -m "$COMMIT_MSG"

              if git push origin HEAD:main; then
                echo "Push succeeded."
                exit 0
              fi
              echo "Push attempt ${attempt} failed; retrying after short delay..."
              sleep 2
            done
            echo "ERROR: Unable to push after 3 attempts due to repeated remote updates."
            exit 1
          fi

      - name: Comment with result
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ Paper-trading rerun workflow completed for ${{ steps.extract.outputs.symbol }} ${{ steps.extract.outputs.version }}.
            - execution_mode: ${{ steps.extract.outputs.execution_mode }}
            - simulation_data_scope: ${{ steps.extract.outputs.simulation_data_scope }}

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}