name: V2 Guideline Matrix

on:
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail workflow when any symbol fails guideline thresholds"
        required: false
        default: "false"
      asset_class:
        description: "Asset class to evaluate (all, crypto, stocks)"
        required: false
        default: "all"
      profile:
        description: "Runtime profile override; defaults to guideline_closed"
        required: false
        default: "guideline_closed"
  schedule:
    - cron: "25 */6 * * *"

jobs:
  guideline-matrix:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
      ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run guideline matrix (report mode, scheduled/default profile)
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.enforce != 'true' && inputs.profile == 'guideline_closed') }}
        run: |
          python backend/strategy_generator/report_v2_guidelines.py \
            --version v2 \
            --profile guideline_closed \
            --asset-class "${{ inputs.asset_class || 'all' }}" \
            --json-out docs/data/v2_guideline_report_ci.json

      - name: Run guideline matrix (report mode, custom profile)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.enforce != 'true' && inputs.profile != 'guideline_closed' }}
        run: |
          python backend/strategy_generator/report_v2_guidelines.py \
            --version v2 \
            --profile "${{ inputs.profile }}" \
            --asset-class "${{ inputs.asset_class || 'all' }}" \
            --json-out docs/data/v2_guideline_report_ci.json

      - name: Run guideline matrix (enforced mode, default profile)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.enforce == 'true' && inputs.profile == 'guideline_closed' }}
        run: |
          python backend/strategy_generator/report_v2_guidelines.py \
            --version v2 \
            --profile guideline_closed \
            --asset-class "${{ inputs.asset_class || 'all' }}" \
            --json-out docs/data/v2_guideline_report_ci.json \
            --enforce

      - name: Run guideline matrix (enforced mode, custom profile)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.enforce == 'true' && inputs.profile != 'guideline_closed' }}
        run: |
          python backend/strategy_generator/report_v2_guidelines.py \
            --version v2 \
            --profile "${{ inputs.profile }}" \
            --asset-class "${{ inputs.asset_class || 'all' }}" \
            --json-out docs/data/v2_guideline_report_ci.json \
            --enforce

      - name: Upload guideline matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-guideline-matrix
          path: docs/data/v2_guideline_report_ci.json
