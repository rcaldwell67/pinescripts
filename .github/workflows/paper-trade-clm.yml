name: Paper Trade CLM

# Runs every 15 minutes during NYSE market hours (Mon–Fri).
# The script checks the Alpaca market clock and exits early if the market
# is closed, so the cron window is intentionally wider than market hours
# to cover both standard time (UTC-5) and daylight time (UTC-4).
#
# Market open  9:30 ET = 13:30 UTC (DST) / 14:30 UTC (standard)
# Market close 4:00 ET = 20:00 UTC (DST) / 21:00 UTC (standard)
# Cron window: 13:00–21:30 UTC  →  safe coverage of both offsets
on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: paper-trade-clm
  cancel-in-progress: false

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # needed to commit updated state + trades CSV
    env:
      ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
      ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir alpaca-py pandas numpy python-dotenv pytz

      - name: Run CLM paper traders
        id: run_traders
        shell: bash
        run: |
          set -uo pipefail

          failures=()

          run_trader() {
            local label="$1"
            local path="$2"

            echo "::group::${label}"
            if python "$path"; then
              echo "${label} completed"
            else
              echo "${label} failed"
              failures+=("${label}")
            fi
            echo "::endgroup::"
          }

          run_trader "APM v6 CLM 1D" "scripts/CLM/Adaptive Pullback Momentum v6/paper_trader_clm_v6.py"
          run_trader "APM v5 CLM 1h" "scripts/CLM/Adaptive Pullback Momentum v5/paper_trader_clm_v5.py"
          run_trader "APM v4 CLM 30m" "scripts/CLM/Adaptive Pullback Momentum v4/paper_trader_clm_v4.py"
          run_trader "APM v3 CLM 15m" "scripts/CLM/Adaptive Pullback Momentum v3/paper_trader_clm_v3.py"
          run_trader "APM v2 CLM 10m" "scripts/CLM/Adaptive Pullback Momentum v2/paper_trader_clm_v2.py"
          run_trader "APM v1 CLM 5m" "scripts/CLM/Adaptive Pullback Momentum v1/paper_trader_clm_v1.py"

          failures_csv=""
          if (( ${#failures[@]} > 0 )); then
            failures_csv="$(IFS=,; echo "${failures[*]}")"
          fi

          echo "Trader failures: ${failures_csv:-none}"

          {
            echo "failure_count=${#failures[@]}"
            echo "failures=${failures_csv}"
          } >> "$GITHUB_OUTPUT"

      - name: Commit trade data if changed
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            docs/data/clm/v6_paper_state.json \
            docs/data/clm/v6_trades_paper.csv \
            docs/data/clm/v5_paper_state.json \
            docs/data/clm/v5_trades_paper.csv \
            docs/data/clm/v4_paper_state.json \
            docs/data/clm/v4_trades_paper.csv \
            docs/data/clm/v1_paper_state.json \
            docs/data/clm/v1_trades_paper.csv \
            docs/data/clm/v2_paper_state.json \
            docs/data/clm/v2_trades_paper.csv \
            docs/data/clm/v3_paper_state.json \
            docs/data/clm/v3_trades_paper.csv \
            || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          else
            git commit -m "chore: paper trade $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Fail if any trader failed
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.run_traders.outputs.failure_count }}" != "0" ]]; then
            echo "One or more CLM traders failed: ${{ steps.run_traders.outputs.failures }}"
            exit 1
          fi
