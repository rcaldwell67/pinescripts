name: Add Symbol to Database

on:
  issues:
    types: [opened, edited, labeled, reopened]

concurrency:
  group: db-writer-main
  cancel-in-progress: false

jobs:
  add-symbol:
    if: ${{ (startsWith(github.event.issue.title, 'Symbol Addition Request:') || startsWith(github.event.issue.title, 'Add symbol:')) && !contains(github.event.issue.labels.*.name, 'add-symbol') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract symbol from issue
        id: extract
        run: |
          TITLE="${{ github.event.issue.title }}"
          SYMBOL=$(echo "$TITLE" | sed -E 's/^Symbol Addition Request:[[:space:]]*//; s/^Add symbol:[[:space:]]*//')
          SYMBOL=$(echo "$SYMBOL" | tr '[:lower:]' '[:upper:]' | xargs)
          if [ -z "$SYMBOL" ]; then
            echo "Failed to extract symbol from issue title: $TITLE"
            exit 1
          fi
          echo "symbol=$SYMBOL" >> $GITHUB_OUTPUT

      - name: Validate symbol with Alpaca
        id: validate
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          SYMBOL="${{ steps.extract.outputs.symbol }}"
          KEY="${ALPACA_PAPER_API_KEY:-$ALPACA_API_KEY}"
          SECRET="${ALPACA_PAPER_API_SECRET:-$ALPACA_API_SECRET}"
          if [ -z "$KEY" ] || [ -z "$SECRET" ]; then
            echo "Alpaca API keys not set. Validation is required."
            exit 1
          fi
          # Validate symbol exists on Alpaca Paper Trading assets.
          STATUS=$(curl -s -o /tmp/alpaca_resp.json -w "%{http_code}" \
            -H "APCA-API-KEY-ID: $KEY" \
            -H "APCA-API-SECRET-KEY: $SECRET" \
            "https://paper-api.alpaca.markets/v2/assets/$SYMBOL")
          RESP=$(cat /tmp/alpaca_resp.json)
          if [ "$STATUS" = "200" ] && echo "$RESP" | grep -q '"symbol"'; then
            echo "Alpaca validation passed for $SYMBOL"
            DESC=$(echo "$RESP" | sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)
            DESC=$(echo "$DESC" | tr '\r\n' ' ' | xargs)
            echo "description=$DESC" >> $GITHUB_OUTPUT
          elif [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "Alpaca Paper authentication failed (HTTP $STATUS). Check ALPACA_PAPER_API_KEY/ALPACA_PAPER_API_SECRET (or fallback ALPACA_API_KEY/ALPACA_API_SECRET)."
            echo "$RESP"
            exit 1
          else
            echo "Alpaca validation failed for $SYMBOL (HTTP $STATUS)"
            echo "$RESP"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add symbol to database
        run: |
          SYMBOL="${{ steps.extract.outputs.symbol }}"
          DESC="${{ steps.validate.outputs.description }}"
          if [ -n "$DESC" ]; then
            python3 backend/data/add_symbol_to_db.py "$SYMBOL" "$DESC"
          else
            python3 backend/data/add_symbol_to_db.py "$SYMBOL"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}

      - name: Run backtest for new symbol
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          SYMBOL="${{ steps.extract.outputs.symbol }}"
          echo "Running backtest for symbol: $SYMBOL (version: v1)"
          python backend/backtest_backtrader_alpaca.py --symbol "$SYMBOL" --version "v1"

      - name: Run paper trading for new symbol
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          SYMBOL="${{ steps.extract.outputs.symbol }}"
          echo "Running paper trading for symbol: $SYMBOL (version: v1)"
          python backend/paper_trading/paper_trade_backtrader_alpaca.py --symbol "$SYMBOL" --version "v1"

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add symbol ${{ steps.extract.outputs.symbol }} to tradingcopilot.db via issue request"
          file_pattern: "docs/data/tradingcopilot.db"
          branch: main
