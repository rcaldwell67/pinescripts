name: Add Symbol from Issue

on:
  issues:
    types: [opened, edited]

concurrency:
  group: db-writer-main
  cancel-in-progress: false

jobs:
  add-symbol:
    if: contains(github.event.issue.labels.*.name, 'add-symbol')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Parse symbol from issue
        id: parse
        run: |
          python - <<'PY'
          import os, re
          body = os.environ.get('ISSUE_BODY', '')
          m = re.search(r'Symbol:\s*([A-Za-z0-9_\-/\.]+)', body, re.IGNORECASE)
          symbol = (m.group(1) if m else '').upper().strip()
          desc = ''
          m2 = re.search(r'Description:\s*(.*)', body)
          if m2:
            desc = m2.group(1).strip()
          if not symbol:
            raise SystemExit('Could not parse Symbol: from issue body')
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as f:
            f.write(f'symbol={symbol}\\n')
            f.write(f'desc={desc}\\n')
          PY
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
      - name: Add symbol to DB
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          SYMBOL="${{ steps.parse.outputs.symbol }}"
          KEY="${ALPACA_PAPER_API_KEY:-$ALPACA_API_KEY}"
          SECRET="${ALPACA_PAPER_API_SECRET:-$ALPACA_API_SECRET}"
          if [ -z "$KEY" ] || [ -z "$SECRET" ]; then
            echo "Alpaca API keys not set. Validation is required."
            exit 1
          fi
          STATUS=$(curl -s -o /tmp/alpaca_resp.json -w "%{http_code}" \
            -H "APCA-API-KEY-ID: $KEY" \
            -H "APCA-API-SECRET-KEY: $SECRET" \
            "https://paper-api.alpaca.markets/v2/assets/$SYMBOL")
          RESP=$(cat /tmp/alpaca_resp.json)
          if [ "$STATUS" = "200" ] && echo "$RESP" | grep -q '"symbol"'; then
            echo "Alpaca validation passed for $SYMBOL"
            DESC=$(echo "$RESP" | sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)
            DESC=$(echo "$DESC" | tr '\r\n' ' ' | xargs)
          elif [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "Alpaca Paper authentication failed (HTTP $STATUS). Check ALPACA_PAPER_API_KEY/ALPACA_PAPER_API_SECRET (or fallback ALPACA_API_KEY/ALPACA_API_SECRET)."
            echo "$RESP"
            exit 1
          else
            echo "Alpaca validation failed for $SYMBOL (HTTP $STATUS)"
            echo "$RESP"
            exit 1
          fi
          ISSUE_DESC="${{ steps.parse.outputs.desc }}"
          FINAL_DESC="$DESC"
          if [ -z "$FINAL_DESC" ]; then
            FINAL_DESC="$ISSUE_DESC"
          fi
          if [ -n "$FINAL_DESC" ]; then
            python backend/data/add_symbol_to_db.py "${{ steps.parse.outputs.symbol }}" "$FINAL_DESC"
          else
            python backend/data/add_symbol_to_db.py "${{ steps.parse.outputs.symbol }}"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}

      - name: Tune symbol-specific runtime overrides (v1/v2)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          SYMBOL="${{ steps.parse.outputs.symbol }}"
          echo "Tuning v1 runtime override for $SYMBOL"
          python backend/strategy_generator/tune_v1_profile.py --symbol "$SYMBOL" --max-evals 24 --out /tmp/v1_symbol_tuning.json --apply --apply-top-level
          echo "Tuning v2 runtime override for $SYMBOL"
          python backend/strategy_generator/tune_v2_profile.py --symbol "$SYMBOL" --max-evals 48 --out /tmp/v2_symbol_tuning.json --apply
          for VERSION in v3 v4 v5 v6; do
            echo "Tuning $VERSION runtime override for $SYMBOL"
            python backend/strategy_generator/tune_v3_v6_profile.py --version "$VERSION" --symbol "$SYMBOL" --max-evals 40 --out "/tmp/${VERSION}_symbol_tuning.json" --apply
          done

      - name: Run backtest for new symbol
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          SYMBOL="${{ steps.parse.outputs.symbol }}"
          for VERSION in v1 v2 v3 v4 v5 v6; do
            echo "Running backtest for symbol: $SYMBOL (version: $VERSION)"
            python backend/backtest_backtrader_alpaca.py --symbol "$SYMBOL" --version "$VERSION"
          done

      - name: Run paper trading for new symbol
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          SYMBOL="${{ steps.parse.outputs.symbol }}"
          for VERSION in v1 v2 v3 v4 v5 v6; do
            echo "Running paper trading for symbol: $SYMBOL (version: $VERSION)"
            python backend/paper_trading/paper_trade_backtrader_alpaca.py --symbol "$SYMBOL" --version "$VERSION"
          done
      - name: Commit DB changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add docs/data/tradingcopilot.db backend/strategy_generator/configs/v1_runtime.json backend/strategy_generator/configs/v2_runtime.json backend/strategy_generator/configs/v3_runtime.json backend/strategy_generator/configs/v4_runtime.json backend/strategy_generator/configs/v5_runtime.json backend/strategy_generator/configs/v6_runtime.json
          git commit -m "Add symbol ${{ steps.parse.outputs.symbol }} via issue #${{ github.event.issue.number }}" || echo 'No changes'
          git push
      - name: Comment and close issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "Symbol ${{ steps.parse.outputs.symbol }} passed Alpaca Paper validation, was added to docs/data/tradingcopilot.db, received v1-v6 symbol-specific runtime tuning, and both backtest and paper-trading runs completed successfully."
