name: Add Symbol from Issue

on:
  issues:
    types: [opened, edited, labeled, reopened]

concurrency:
  group: add-symbol-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  add-symbol:
    if: contains(github.event.issue.labels.*.name, 'add-symbol')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Load .env (if present)
        shell: bash
        run: |
          if [ ! -f .env ]; then
            echo ".env not found in repository checkout; relying on GitHub Secrets fallback."
            exit 0
          fi

          while IFS= read -r line || [ -n "$line" ]; do
            line="${line%$'\r'}"
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
            [[ "$line" != *=* ]] && continue

            key="${line%%=*}"
            value="${line#*=}"
            key="$(echo "$key" | xargs)"

            if [[ "$value" =~ ^\".*\"$ ]] || [[ "$value" =~ ^\'.*\'$ ]]; then
              value="${value:1:${#value}-2}"
            fi

            echo "$key=$value" >> "$GITHUB_ENV"
          done < .env

      - name: Resolve Alpaca credentials
        shell: bash
        env:
          SECRET_ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          SECRET_ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: |
          set_or_fallback() {
            local var_name="$1"
            local fallback_value="$2"
            local current_value="${!var_name:-}"
            if [ -n "$current_value" ]; then
              echo "$var_name already set (for example via .env)."
              return
            fi
            if [ -n "$fallback_value" ]; then
              echo "$var_name=$fallback_value" >> "$GITHUB_ENV"
              echo "$var_name sourced from GitHub Secrets fallback."
              return
            fi
            echo "$var_name is not set."
          }

          # Prioritize PAPER credentials for add-symbol workflow
          set_or_fallback ALPACA_PAPER_API_KEY "$SECRET_ALPACA_PAPER_API_KEY"
          set_or_fallback ALPACA_PAPER_API_SECRET "$SECRET_ALPACA_PAPER_API_SECRET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Parse symbol from issue
        id: parse
        run: |
          BODY="${ISSUE_BODY:-}"
          SYMBOL=$(printf '%s' "$BODY" | sed -nE 's/.*[Ss]ymbol:[[:space:]]*([A-Za-z0-9_\-\/\.]+).*/\1/p' | head -n1 | tr '[:lower:]' '[:upper:]' | xargs)
          DESC=$(printf '%s' "$BODY" | sed -nE 's/.*[Dd]escription:[[:space:]]*(.*)$/\1/p' | head -n1 | xargs)

          if [ -z "$SYMBOL" ]; then
            echo "Could not parse Symbol: from issue body"
            exit 1
          fi

          echo "symbol=$SYMBOL" >> "$GITHUB_OUTPUT"
          echo "desc=$DESC" >> "$GITHUB_OUTPUT"
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
      - name: Add symbol to DB
        run: |
          SYMBOL="${{ steps.parse.outputs.symbol }}"
          KEY="${ALPACA_PAPER_API_KEY:-}"
          SECRET="${ALPACA_PAPER_API_SECRET:-}"
          AUTH_UNAVAILABLE="false"
          VALIDATION_SYMBOL=""
          DESC=""
          RESP=""

          if [ -z "$KEY" ] || [ -z "$SECRET" ]; then
            AUTH_UNAVAILABLE="true"
            echo "Alpaca API keys not set. Falling back to local alpaca_symbols cache."
          else
            for CANDIDATE in "$SYMBOL" "${SYMBOL//\//}"; do
              [ -z "$CANDIDATE" ] && continue
              CANDIDATE_URL=$(python - "$CANDIDATE" <<'PY'
          import sys
          from urllib.parse import quote
          print(quote(sys.argv[1], safe=''))
          PY
              )
              STATUS=$(curl -s -o /tmp/alpaca_resp.json -w "%{http_code}" \
                -H "APCA-API-KEY-ID: $KEY" \
                -H "APCA-API-SECRET-KEY: $SECRET" \
                "https://paper-api.alpaca.markets/v2/assets/$CANDIDATE_URL")
              RESP=$(cat /tmp/alpaca_resp.json)

              if [ "$STATUS" = "200" ] && echo "$RESP" | grep -q '"symbol"'; then
                VALIDATION_SYMBOL="$CANDIDATE"
                DESC=$(echo "$RESP" | sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)
                DESC=$(echo "$DESC" | tr '\r\n' ' ' | xargs)
                break
              fi

              if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
                AUTH_UNAVAILABLE="true"
                echo "Alpaca Paper authentication failed (HTTP $STATUS). Falling back to local alpaca_symbols cache."
                echo "$RESP"
                break
              fi
            done
          fi

          if [ -z "$VALIDATION_SYMBOL" ]; then
            CACHE_RESULT=$(python - "$SYMBOL" <<'PY'
          import sqlite3
          import sys

          symbol = sys.argv[1].strip().upper()
          candidates = [symbol]
          no_slash = symbol.replace('/', '')
          if no_slash != symbol:
            candidates.append(no_slash)

          conn = sqlite3.connect('docs/data/tradingcopilot.db')
          cur = conn.cursor()
          row = None
          for cand in candidates:
            cur.execute("SELECT symbol, COALESCE(name, '') FROM alpaca_symbols WHERE UPPER(symbol)=UPPER(?) LIMIT 1", (cand,))
            row = cur.fetchone()
            if row:
              break
          conn.close()

          if row:
            print(f"{row[0]}|{row[1]}")
          PY
            )
            if [ -n "$CACHE_RESULT" ]; then
              VALIDATION_SYMBOL="${CACHE_RESULT%%|*}"
              DESC="${CACHE_RESULT#*|}"
              DESC=$(echo "$DESC" | tr '\r\n' ' ' | xargs)
              echo "Local cache validation passed for $SYMBOL (matched $VALIDATION_SYMBOL)."
            fi
          fi

          if [ -z "$VALIDATION_SYMBOL" ]; then
            echo "Symbol validation failed for $SYMBOL (Alpaca API and local cache)."
            echo "$RESP"
            exit 1
          fi

          echo "Alpaca validation passed for $SYMBOL (validated as $VALIDATION_SYMBOL)"
          ISSUE_DESC="${{ steps.parse.outputs.desc }}"
          FINAL_DESC="$DESC"
          if [ -z "$FINAL_DESC" ]; then
            FINAL_DESC="$ISSUE_DESC"
          fi
          if [ -n "$FINAL_DESC" ]; then
            python backend/data/add_symbol_to_db.py "${{ steps.parse.outputs.symbol }}" "$FINAL_DESC"
          else
            python backend/data/add_symbol_to_db.py "${{ steps.parse.outputs.symbol }}"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tune symbol-specific runtime overrides (v1/v2)
        run: |
          SYMBOL="${{ steps.parse.outputs.symbol }}"
          echo "Tuning v1 runtime override for $SYMBOL"
          python backend/strategy_generator/tune_v1_profile.py --symbol "$SYMBOL" --max-evals 24 --out /tmp/v1_symbol_tuning.json --apply --apply-top-level
          echo "Tuning v2 runtime override for $SYMBOL"
          python backend/strategy_generator/tune_v2_profile.py --symbol "$SYMBOL" --max-evals 48 --out /tmp/v2_symbol_tuning.json --apply
          for VERSION in v3 v4 v5 v6; do
            echo "Tuning $VERSION runtime override for $SYMBOL"
            python backend/strategy_generator/tune_v3_v6_profile.py --version "$VERSION" --symbol "$SYMBOL" --max-evals 40 --out "/tmp/${VERSION}_symbol_tuning.json" --apply
          done

      - name: Run backtest for new symbol
        run: |
          SYMBOL="${{ steps.parse.outputs.symbol }}"
          for VERSION in v1 v2 v3 v4 v5 v6; do
            echo "Running backtest for symbol: $SYMBOL (version: $VERSION)"
            python backend/backtest_backtrader_alpaca.py --symbol "$SYMBOL" --version "$VERSION"
          done

      - name: Run paper trading for new symbol
        run: |
          SYMBOL="${{ steps.parse.outputs.symbol }}"
          for VERSION in v1 v2 v3 v4 v5 v6; do
            echo "Running paper trading for symbol: $SYMBOL (version: $VERSION)"
            python backend/paper_trading/paper_trade_backtrader_alpaca.py --symbol "$SYMBOL" --version "$VERSION"
          done
      - name: Commit DB changes
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/data/tradingcopilot.db backend/strategy_generator/configs/v1_runtime.json backend/strategy_generator/configs/v2_runtime.json backend/strategy_generator/configs/v3_runtime.json backend/strategy_generator/configs/v4_runtime.json backend/strategy_generator/configs/v5_runtime.json backend/strategy_generator/configs/v6_runtime.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add symbol ${{ steps.parse.outputs.symbol }} via issue #${{ github.event.issue.number }}"
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying after short delay..."
            sleep 2
          done
          echo "ERROR: Unable to push after 3 attempts due to repeated remote updates."
          exit 1
      - name: Comment and close issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "Symbol ${{ steps.parse.outputs.symbol }} passed Alpaca Paper validation, was added to docs/data/tradingcopilot.db, received v1-v6 symbol-specific runtime tuning, and both backtest and paper-trading runs completed successfully."
