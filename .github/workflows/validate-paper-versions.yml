name: Validate Paper Versions

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-paper-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate v1-v6 paper DB writes
        run: |
          python backend/paper_trading/validate_paper_versions_db.py --version v6
