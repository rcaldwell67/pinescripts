name: Validate Live Versions

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-live-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate v1-v6 live dry order generation
        run: |
          python backend/live_trading/validate_live_versions_dry.py --version v6
