name: Paper Trade (Generic)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      symbol:
        description: "Optional symbol to run, e.g. BTC/USD"
        required: false
        type: string
      version:
        description: "Strategy version to run"
        required: false
        default: "v1"
        type: string
      execution_mode:
        description: "realtime (Alpaca orders) or simulation (backtest-style)"
        required: false
        default: "realtime"
        type: string
      force_reset:
        description: "Delete and regenerate all paper trades (instead of appending new)"
        required: false
        default: "false"
        type: string

concurrency:
  group: paper-trade-generic
  cancel-in-progress: false

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
      ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper-trading
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version || 'v1' }}"
          SYMBOL="${{ github.event.inputs.symbol || '' }}"
          EXECUTION_MODE="${{ github.event.inputs.execution_mode || 'realtime' }}"
          FORCE_RESET_FLAG=""
          if [[ "${{ github.event.inputs.force_reset || 'false' }}" == "true" ]]; then
            FORCE_RESET_FLAG="--force-reset"
          fi

          if [[ -n "$SYMBOL" ]]; then
            TARGET_FLAG="--symbol $SYMBOL"
          else
            TARGET_FLAG="--all-symbols"
          fi

          if [[ "$EXECUTION_MODE" == "simulation" ]]; then
            if [[ "$VERSION" == "v1" ]]; then
              echo "Running aligned v1 backtest/paper regeneration ($TARGET_FLAG)"
              if [[ -n "$SYMBOL" ]]; then
                python reset_v1_aligned_backtest_paper.py --symbol "$SYMBOL"
              else
                python reset_v1_aligned_backtest_paper.py
              fi
            else
              echo "Running simulation paper trading ($TARGET_FLAG) for version $VERSION"
              python backend/paper_trading/paper_trade_backtrader_alpaca.py $TARGET_FLAG --version "$VERSION" $FORCE_RESET_FLAG
            fi
          else
            echo "Running realtime Alpaca paper trading ($TARGET_FLAG) for version $VERSION"
            python backend/paper_trading/realtime_alpaca_paper_trader.py $TARGET_FLAG --version "$VERSION"
          fi

      - name: Verify parity (v1 simulation)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version || 'v1' }}"
          SYMBOL="${{ github.event.inputs.symbol || '' }}"
          EXECUTION_MODE="${{ github.event.inputs.execution_mode || 'realtime' }}"

          if [[ "$EXECUTION_MODE" != "simulation" ]]; then
            echo "Skipping parity check: execution_mode=$EXECUTION_MODE"
            exit 0
          fi

          if [[ "$VERSION" != "v1" ]]; then
            echo "Skipping parity check: version=$VERSION (validator currently targets v1)"
            exit 0
          fi

          if [[ -n "$SYMBOL" ]]; then
            echo "Running parity check for symbol=$SYMBOL version=$VERSION"
            python backend/paper_trading/verify_v1_parity.py --version "$VERSION" --symbol "$SYMBOL"
          else
            echo "Running parity check for all symbols version=$VERSION"
            python backend/paper_trading/verify_v1_parity.py --version "$VERSION"
          fi

      - name: Commit updated DB
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tradingcopilot.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
            exit 0
          fi
          git commit -m "chore: paper trade $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push origin HEAD:main