name: Paper Trade (Generic)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      symbol:
        description: "Optional symbol to run, e.g. BTC/USD"
        required: false
        type: string
      version:
        description: "Strategy version to run (v1-v6 or all)"
        required: false
        default: "v6"
        type: string
      execution_mode:
        description: "realtime (Alpaca orders) or simulation (backtest-style)"
        required: false
        default: "simulation"
        type: string
      max_open_positions:
        description: "Realtime mode: max simultaneous open positions"
        required: false
        default: "8"
        type: string
      close_on_signal:
        description: "Realtime mode: close existing position when a fresh signal appears"
        required: false
        default: "false"
        type: string
      stream_bars:
        description: "Realtime mode (manual only): trigger evaluations from Alpaca websocket bars"
        required: false
        default: "false"
        type: string
      force_reset:
        description: "Delete and regenerate all paper trades (instead of appending new)"
        required: false
        default: "false"
        type: string
      prefer_realtime_data:
        description: "Simulation mode: try appending latest realtime Alpaca bar before backtest-style run"
        required: false
        default: "true"
        type: string
      realtime_only_data:
        description: "Simulation mode: require Alpaca data only (disable historical fallback sources)"
        required: false
        default: "true"
        type: string
      simulation_data_scope:
        description: "Simulation mode: data scope (historical or same_day)"
        required: false
        default: "historical"
        type: string

concurrency:
  group: db-writer-main
  cancel-in-progress: true

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
      ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper-trading
        shell: bash
        run: |
          set -euo pipefail
          VERSION_INPUT="${{ github.event.inputs.version || 'v1' }}"
          SYMBOL="${{ github.event.inputs.symbol || '' }}"
          EXECUTION_MODE="${{ github.event.inputs.execution_mode || 'simulation' }}"
          MAX_OPEN_POSITIONS="${{ github.event.inputs.max_open_positions || '8' }}"
          CLOSE_ON_SIGNAL="${{ github.event.inputs.close_on_signal || 'false' }}"
          STREAM_BARS="${{ github.event.inputs.stream_bars || 'false' }}"
          PREFER_REALTIME_DATA="${{ github.event.inputs.prefer_realtime_data || 'true' }}"
          REALTIME_ONLY_DATA="${{ github.event.inputs.realtime_only_data || 'true' }}"
          SIMULATION_DATA_SCOPE="${{ github.event.inputs.simulation_data_scope || 'historical' }}"
          FORCE_RESET_FLAG=""
          if [[ "${{ github.event.inputs.force_reset || 'false' }}" == "true" ]]; then
            FORCE_RESET_FLAG="--force-reset"
          fi
          REALTIME_DATA_FLAG=""
          if [[ "${PREFER_REALTIME_DATA,,}" == "true" || "${PREFER_REALTIME_DATA}" == "1" || "${PREFER_REALTIME_DATA,,}" == "yes" ]]; then
            REALTIME_DATA_FLAG="--prefer-realtime-data"
          fi
          REALTIME_ONLY_FLAG=""
          if [[ "${REALTIME_ONLY_DATA,,}" == "true" || "${REALTIME_ONLY_DATA}" == "1" || "${REALTIME_ONLY_DATA,,}" == "yes" ]]; then
            REALTIME_ONLY_FLAG="--realtime-only-data"
          fi
          SIM_SCOPE_FLAG=""
          case "${SIMULATION_DATA_SCOPE}" in
            historical|same_day)
              SIM_SCOPE_FLAG="--data-scope ${SIMULATION_DATA_SCOPE}"
              ;;
            *)
              echo "Unsupported simulation_data_scope: ${SIMULATION_DATA_SCOPE} (expected historical|same_day)" >&2
              exit 1
              ;;
          esac

          if [[ -n "$SYMBOL" ]]; then
            TARGET_FLAG="--symbol $SYMBOL"
          else
            TARGET_FLAG="--all-symbols"
          fi

          if [[ "${VERSION_INPUT,,}" == "all" ]]; then
            VERSIONS=(v1 v2 v3 v4 v5 v6)
          else
            VERSIONS=("${VERSION_INPUT,,}")
          fi

          for VERSION in "${VERSIONS[@]}"; do
            case "$VERSION" in
              v1|v2|v3|v4|v5|v6) ;;
              *)
                echo "Unsupported version: $VERSION (expected v1-v6 or all)" >&2
                exit 1
                ;;
            esac

            if [[ "$EXECUTION_MODE" == "simulation" ]]; then
              if [[ "$VERSION" == "v1" ]]; then
                echo "Running aligned v1 backtest/paper regeneration ($TARGET_FLAG)"
                if [[ -n "$SYMBOL" ]]; then
                  python reset_aligned_backtest_paper.py --version v1 --symbol "$SYMBOL" $REALTIME_DATA_FLAG $REALTIME_ONLY_FLAG $SIM_SCOPE_FLAG
                else
                  python reset_aligned_backtest_paper.py --version v1 $REALTIME_DATA_FLAG $REALTIME_ONLY_FLAG $SIM_SCOPE_FLAG
                fi
              elif [[ "$VERSION" == "v2" ]]; then
                echo "Running aligned v2 backtest/paper regeneration ($TARGET_FLAG)"
                if [[ -n "$SYMBOL" ]]; then
                  python reset_aligned_backtest_paper.py --version v2 --symbol "$SYMBOL" $REALTIME_DATA_FLAG $REALTIME_ONLY_FLAG $SIM_SCOPE_FLAG
                else
                  python reset_aligned_backtest_paper.py --version v2 $REALTIME_DATA_FLAG $REALTIME_ONLY_FLAG $SIM_SCOPE_FLAG
                fi
              else
                echo "Running simulation paper trading ($TARGET_FLAG) for version $VERSION"
                python backend/paper_trading/paper_trade_backtrader_alpaca.py $TARGET_FLAG --version "$VERSION" $FORCE_RESET_FLAG $REALTIME_DATA_FLAG $REALTIME_ONLY_FLAG $SIM_SCOPE_FLAG
              fi
            else
              echo "Running realtime Alpaca paper trading ($TARGET_FLAG) for version $VERSION"
              EXTRA_FLAGS="--max-open-positions ${MAX_OPEN_POSITIONS}"
              if [[ "${CLOSE_ON_SIGNAL,,}" == "true" || "${CLOSE_ON_SIGNAL}" == "1" || "${CLOSE_ON_SIGNAL,,}" == "yes" ]]; then
                EXTRA_FLAGS+=" --close-on-signal"
              fi

              # Keep websocket mode manual-only to avoid long-running stream sessions on schedule triggers.
              if [[ "${{ github.event_name }}" == "workflow_dispatch" && ( "${STREAM_BARS,,}" == "true" || "${STREAM_BARS}" == "1" || "${STREAM_BARS,,}" == "yes" ) ]]; then
                EXTRA_FLAGS+=" --stream-bars"
              fi

              python backend/paper_trading/realtime_alpaca_paper_trader.py $TARGET_FLAG --version "$VERSION" $EXTRA_FLAGS
            fi
          done

      - name: Verify parity (simulation)
        shell: bash
        run: |
          set -euo pipefail
          VERSION_INPUT="${{ github.event.inputs.version || 'v1' }}"
          SYMBOL="${{ github.event.inputs.symbol || '' }}"
          EXECUTION_MODE="${{ github.event.inputs.execution_mode || 'simulation' }}"

          if [[ "$EXECUTION_MODE" != "simulation" ]]; then
            echo "Skipping parity check: execution_mode=$EXECUTION_MODE"
            exit 0
          fi

          if [[ "${VERSION_INPUT,,}" == "all" ]]; then
            VERSIONS=(v1 v2 v3 v4 v5 v6)
          else
            VERSIONS=("${VERSION_INPUT,,}")
          fi

          for VERSION in "${VERSIONS[@]}"; do
            case "$VERSION" in
              v1|v2|v3|v4|v5|v6) ;;
              *)
                echo "Unsupported version: $VERSION (expected v1-v6 or all)" >&2
                exit 1
                ;;
            esac

            if [[ "$VERSION" == "v1" ]]; then
              if [[ -n "$SYMBOL" ]]; then
                echo "Running v1 parity check for symbol=$SYMBOL version=$VERSION"
                python backend/paper_trading/verify_v1_parity.py --version "$VERSION" --symbol "$SYMBOL"
              else
                echo "Running v1 parity check for all symbols version=$VERSION"
                python backend/paper_trading/verify_v1_parity.py --version "$VERSION"
              fi
            else
              if [[ -n "$SYMBOL" ]]; then
                echo "Running parity check for symbol=$SYMBOL version=$VERSION"
                python backend/paper_trading/verify_v2_parity.py --version "$VERSION" --symbol "$SYMBOL"
              else
                echo "Running parity check for all symbols version=$VERSION"
                python backend/paper_trading/verify_v2_parity.py --version "$VERSION"
              fi
            fi
          done

      - name: Commit updated DB
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tradingcopilot.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
            exit 0
          fi
          COMMIT_MSG="chore: paper trade $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SNAPSHOT_DB="$(mktemp)"
          cp docs/data/tradingcopilot.db "$SNAPSHOT_DB"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            git fetch origin main
            git reset --hard origin/main
            cp "$SNAPSHOT_DB" docs/data/tradingcopilot.db

            git add docs/data/tradingcopilot.db
            if git diff --cached --quiet; then
              echo "No effective DB changes remain after syncing with origin/main."
              exit 0
            fi

            git commit -m "$COMMIT_MSG"
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying after short delay..."
            sleep 2
          done

          echo "ERROR: Unable to push after 3 attempts due to repeated remote updates."
          exit 1