name: Paper Trade CLM

# Runs every 15 minutes during NYSE market hours (Mon–Fri).
# The script checks the Alpaca market clock and exits early if the market
# is closed, so the cron window is intentionally wider than market hours
# to cover both standard time (UTC-5) and daylight time (UTC-4).
#
# Market open  9:30 ET = 13:30 UTC (DST) / 14:30 UTC (standard)
# Market close 4:00 ET = 20:00 UTC (DST) / 21:00 UTC (standard)
# Cron window: 13:00–21:30 UTC  →  safe coverage of both offsets
on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch:

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated state + trades CSV

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir alpaca-py pandas numpy python-dotenv

      - name: Run paper trader v3 (CLM 15m)
        env:
          ALPACA_PAPER_API_KEY:    ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: python docs/paper_trader.py

      - name: Run paper trader v2 (CLM 10m)
        env:
          ALPACA_PAPER_API_KEY:    ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: python docs/paper_trader_v2.py

      - name: Run paper trader v1 (CLM)
        env:
          ALPACA_PAPER_API_KEY:    ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
        run: python docs/paper_trader_v1.py

      - name: Commit trade data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            docs/data/clm/v1_paper_state.json \
            docs/data/clm/v1_trades_paper.csv \
            docs/data/clm/v2_paper_state.json \
            docs/data/clm/v2_trades_paper.csv \
            docs/data/clm/v3_paper_state.json \
            docs/data/clm/v3_trades_paper.csv \
            || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: paper trade $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
