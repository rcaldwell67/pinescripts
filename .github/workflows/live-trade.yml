name: Live Trade (Manual, Guarded)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      symbol:
        description: "Optional symbol to run, e.g. CLM"
        required: false
        type: string
      version:
        description: "Strategy version to run (v1-v6 or all)"
        required: false
        default: "v6"
        type: string
      confirm_live_trading:
        description: "Set to true to enable live order placement"
        required: false
        default: "false"
        type: string

concurrency:
  group: db-writer-main
  cancel-in-progress: false

jobs:
  live-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALLOW_ALPACA_LIVE_TRADING: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.confirm_live_trading || 'false') || 'false' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live trading (guarded)
        shell: bash
        run: |
          set -euo pipefail
          VERSION_INPUT="${{ github.event.inputs.version || 'v1' }}"
          SYMBOL="${{ github.event.inputs.symbol || '' }}"

          if [[ "${VERSION_INPUT,,}" == "all" ]]; then
            VERSIONS=(v1 v2 v3 v4 v5 v6)
          else
            VERSIONS=("${VERSION_INPUT,,}")
          fi

          if [[ "${ALLOW_ALPACA_LIVE_TRADING,,}" != "true" && "${ALLOW_ALPACA_LIVE_TRADING}" != "1" && "${ALLOW_ALPACA_LIVE_TRADING,,}" != "yes" ]]; then
            echo "Skipping live trading: ALLOW_ALPACA_LIVE_TRADING is not enabled."
            exit 0
          fi

          for VERSION in "${VERSIONS[@]}"; do
            case "$VERSION" in
              v1|v2|v3|v4|v5|v6) ;;
              *)
                echo "Unsupported version: $VERSION (expected v1-v6 or all)" >&2
                exit 1
                ;;
            esac

            if [[ -n "$SYMBOL" ]]; then
              python backend/live_trading/realtime_alpaca_live_trader.py --symbol "$SYMBOL" --version "$VERSION"
            else
              python backend/live_trading/realtime_alpaca_live_trader.py --all-symbols --version "$VERSION"
            fi
          done

      - name: Validate live fill/trade consistency
        shell: bash
        run: |
          set -euo pipefail
          VERSION_INPUT="${{ github.event.inputs.version || 'v1' }}"
          SYMBOL="${{ github.event.inputs.symbol || '' }}"

          if [[ "${VERSION_INPUT,,}" == "all" ]]; then
            VERSIONS=(v1 v2 v3 v4 v5 v6)
          else
            VERSIONS=("${VERSION_INPUT,,}")
          fi

          if [[ "${ALLOW_ALPACA_LIVE_TRADING,,}" != "true" && "${ALLOW_ALPACA_LIVE_TRADING}" != "1" && "${ALLOW_ALPACA_LIVE_TRADING,,}" != "yes" ]]; then
            echo "Skipping live consistency check: ALLOW_ALPACA_LIVE_TRADING is not enabled."
            exit 0
          fi

          for VERSION in "${VERSIONS[@]}"; do
            case "$VERSION" in
              v1|v2|v3|v4|v5|v6) ;;
              *)
                echo "Unsupported version: $VERSION (expected v1-v6 or all)" >&2
                exit 1
                ;;
            esac

            if [[ -n "$SYMBOL" ]]; then
              python backend/live_trading/verify_live_consistency.py --symbol "$SYMBOL" --version "$VERSION"
            else
              python backend/live_trading/verify_live_consistency.py --version "$VERSION"
            fi
          done

      - name: Commit updated DB
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tradingcopilot.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
            exit 0
          fi
          COMMIT_MSG="chore: live trade $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SNAPSHOT_DB="$(mktemp)"
          cp docs/data/tradingcopilot.db "$SNAPSHOT_DB"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            git fetch origin main
            git reset --hard origin/main
            cp "$SNAPSHOT_DB" docs/data/tradingcopilot.db

            git add docs/data/tradingcopilot.db
            if git diff --cached --quiet; then
              echo "No effective DB changes remain after syncing with origin/main."
              exit 0
            fi

            git commit -m "$COMMIT_MSG"
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying after short delay..."
            sleep 2
          done

          echo "ERROR: Unable to push after 3 attempts due to repeated remote updates."
          exit 1
