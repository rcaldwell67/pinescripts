name: Validate Symbol Override Dispatch

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  validate-symbol-overrides:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate symbol override dispatch
        run: |
          python backend/strategy_generator/validate_symbol_override_dispatch.py